// ── 开盘信号模型 ─────────────────────────────────────────────────
// 回归：次日开盘跳空幅（openChanges[next]）→ 当天开盘到收盘（openToClose[next]）
// 逻辑：知道了开盘跳多少，预测今天收盘时是跌回来还是继续涨
function calcOpenToBeta(ticker) {
  if (_cachedOpenBeta[ticker]) return _cachedOpenBeta[ticker];
  const d = stockData[ticker];
  if (!d) return { beta: 0, pts: 0, xPts: [], mean: 0, std: 1, gapWinRates: {} };
  const oc = d.openChanges || [];
  const otc = d.openToClose || [];
  const xPts = [];
  for (let i = 0; i < d.dates.length; i++) {
    if (oc[i] == null || otc[i] == null) continue;
    xPts.push([oc[i], otc[i]]);
  }
  const vals = otc.filter(v => v != null);
  const mean = vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : 0;
  const std  = vals.length > 1 ? Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length)||1 : 1;

  // 按开盘跳空幅度分组，统计各标的自己的历史胜率
  // 低开做多胜率 / 高开做空胜率，需至少5次样本才有效
  const longBins  = [[-Infinity,-2],[-2,-1.5],[-1.5,-1],[-1,-0.5]];
  const shortBins = [[0.5,1],[1,1.5],[1.5,2],[2,Infinity]];
  const gapWinRates = {};  // key: e.g. 'long_-2' or 'short_2'
  for (const [lo,hi] of longBins) {
    const grp = xPts.filter(([x])=> x>=lo && x<hi);
    if (grp.length >= 5) gapWinRates[`long_${lo}`] = { rate: grp.filter(([,y])=>y>0).length/grp.length, n: grp.length };
  }
  for (const [lo,hi] of shortBins) {
    const grp = xPts.filter(([x])=> x>=lo && x<hi);
    if (grp.length >= 5) gapWinRates[`short_${lo}`] = { rate: grp.filter(([,y])=>y<0).length/grp.length, n: grp.length };
  }

  const result = { beta: simpleLR(xPts), pts: xPts.length, xPts, mean, std, gapWinRates };
  _cachedOpenBeta[ticker] = result;
  return result;
}

// 根据标的自身历史胜率表，查询给定开盘跳空幅度的方向和胜率
function getOpenGapSignal(ticker, openChg) {
  const fb = calcOpenToBeta(ticker);
  if (openChg == null) return { dir: 'neut', winRateEst: null };
  const gwr = fb.gapWinRates;

  // 低开：从最大跳空区间往小找，取第一个有数据的区间
  if (openChg < 0) {
    for (const lo of [-Infinity, -2, -1.5, -1]) {
      const key = `long_${lo}`;
      if (gwr[key] && openChg < (lo === -Infinity ? -2 : lo === -2 ? -1.5 : lo === -1.5 ? -1 : -0.5)) {
        return { dir: gwr[key].rate >= 0.55 ? 'long' : 'neut', winRateEst: gwr[key].rate, n: gwr[key].n };
      }
    }
    // fallback: -0.5以下
    const k = 'long_-1'; if (gwr[k]) return { dir: gwr[k].rate >= 0.55 ? 'long' : 'neut', winRateEst: gwr[k].rate, n: gwr[k].n };
  }

  // 高开：从最大跳空区间往小找
  if (openChg > 0) {
    for (const lo of [2, 1.5, 1, 0.5]) {
      const key = `short_${lo}`;
      if (gwr[key] && openChg >= lo) {
        return { dir: gwr[key].rate >= 0.55 ? 'short' : 'neut', winRateEst: gwr[key].rate, n: gwr[key].n };
      }
    }
  }

  return { dir: 'neut', winRateEst: null };
}

// 获取次日开盘跳空：allDates[dateIdx+1] 的 openChanges
function getNextOpenChg(ticker, targetDate) {
  const d = stockData[ticker];
  if (!d) return null;
  const idx = _stockDateIdx[ticker];
  const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
  if (ti < 0) return null;
  const ni = ti + 1;
  if (ni >= d.dates.length) return null;
  return (d.openChanges || [])[ni] ?? null;
}

function getNextOpenToClose(ticker, targetDate) {

  const idx = _stockDateIdx[ticker];
  const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);

}

// 今日实时：用NQ=F盘中作为明日开盘跳空的代理，预测开盘后走向
function openSignalPredict(ticker) {
  const fb = calcOpenToBeta(ticker);
  if (fb.pts < 10) return null;
  const d = stockData[ticker];
  if (!d) return null;
  // 今日已知开盘跳空（开盘价vs昨收）作为特征
  const todayOC = (d.openChanges || []).at(-1);
  if (todayOC == null) return null;
  const predicted = fb.beta * todayOC;
  const score = Math.abs(todayOC);
  const sig = getOpenGapSignal(ticker, todayOC);
  const wr = calcWinRate(fb.xPts, todayOC);
  return { dir: sig.dir, score, predicted, beta: fb.beta, openChg: todayOC, winRate: wr, winRateEst: sig.winRateEst, winRateN: sig.n ?? null };
}

// 计算指定日期范围内「开盘排名第一」的历史胜率
function calcOpenTop1Stats(allDates, startDate, endDate) {
  const rangeDates = allDates.filter(d => d >= startDate && d <= endDate && d < allDates[allDates.length - 1]);
  let hit = 0, tot = 0;
  const details = [];

  for (const targetDate of rangeDates) {
    const dateIdx = allDates.indexOf(targetDate);
    const nextDate = dateIdx >= 0 && dateIdx < allDates.length - 1 ? allDates[dateIdx + 1] : null;
    if (!nextDate) continue;

    const candidates = [];
    for (const { ticker } of SYMBOLS) {
      const d = stockData[ticker];
      if (!d) continue;
      const idx = _stockDateIdx[ticker];
      const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
      if (ti < 0 || d.changes[ti] == null) continue;

      const fb = calcOpenToBeta(ticker);
      const oc = (d.openChanges || [])[ti] ?? null;
      const nextOc = getNextOpenChg(ticker, targetDate);
      if (nextOc == null) continue;

      const sig = getOpenGapSignal(ticker, nextOc);
      const mrevDir = sig.dir;
      const mrevSignal = mrevDir === 'long' ? 1 : mrevDir === 'short' ? -1 : 0;

      const rfE = _cachedRfOpenModel?.preds?.[targetDate]?.[ticker];
      const dlE = _cachedDlOpenModel?.preds?.[targetDate]?.[ticker];
      const rfProb = rfE?.prob ?? null;
      const dlProb = dlE?.prob ?? null;
      const hasRF = rfProb != null, hasDL = dlProb != null;
      const W_MREV = 0.45, W_RULE = 0.10;
      const W_RF = hasRF ? 0.22 : 0, W_DL = hasDL ? 0.23 : 0;
      const total = W_MREV + W_RULE + W_RF + W_DL || 1;
      const rfSig = rfProb != null ? (rfProb - 0.5) * 2 : 0;
      const dlSig = dlProb != null ? (dlProb - 0.5) * 2 : 0;
      let score = (mrevSignal * W_MREV + rfSig * W_RF + dlSig * W_DL) / total;

      // 过滤衰减
      const dr = d.dayRanges || [];
      const drVals = [0,1,2,3,4].map(j => dr[ti-j]).filter(v => v != null);
      const atr5 = drVals.length ? drVals.reduce((a,b) => a+b) / drVals.length : null;
      const allChgs = SYMBOLS.map(s2 => {
        const dd = stockData[s2.ticker]; if (!dd) return null;
        const ii = _stockDateIdx[s2.ticker]?.get(targetDate) ?? dd.dates.indexOf(targetDate);
        return ii >= 0 && dd.changes[ii] != null ? dd.changes[ii] : null;
      }).filter(v => v != null);
      const marketUpCount = allChgs.filter(v => v > 0).length;
      const qqq = stockData['QQQ'];
      const qi = qqq ? (_qqqDateIdx?.get(targetDate) ?? qqq.dates.indexOf(targetDate)) : -1;
      const qqqRet1 = qi >= 0 ? qqq.changes[qi] : null;
      const obsChk = { todayOpenChg: nextOc, todayChg: d.changes[ti], atr5, marketUpCount, qqqRet1 };
      if (checkMissFilter(obsChk, _cachedMissPatterns?.openFilters)) score *= 0.3;

      if (Math.abs(score) > 0.05) {
        const actualOtc = getNextOpenToClose(ticker, targetDate);
        if (actualOtc != null) {
          candidates.push({ ticker, score, actualOtc, color: SYMBOLS.find(s=>s.ticker===ticker)?.color });
        }
      }
    }

    if (!candidates.length) continue;
    const top = candidates.reduce((best, c) => Math.abs(c.score) > Math.abs(best.score) ? c : best, candidates[0]);
    const topHit = (top.score > 0) === (top.actualOtc > 0);
    if (topHit) hit++;
    tot++;
    details.push({ date: targetDate, ticker: top.ticker, score: top.score, actual: top.actualOtc, hit: topHit, color: top.color });
  }

  return { hit, tot, rate: tot > 0 ? hit / tot : null, details };
}

function calcCloseTop1Stats(startDate, endDate) {
  if (!_dateSignalCache) return { hit: 0, tot: 0, rate: null, details: [] };

  let hit = 0, tot = 0;
  const details = [];

  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const allDates = [...allDatesSet].sort();

  for (const targetDate of allDates) {
    if (targetDate < startDate || targetDate > endDate) continue;
    const tickerMap = _dateSignalCache.get(targetDate);
    if (!tickerMap) continue;

    const di = allDates.indexOf(targetDate);
    const nextDate = di >= 0 && di + 1 < allDates.length ? allDates[di + 1] : null;
    if (!nextDate) continue;

    let bestTicker = null, bestAbsScore = -1, bestScore = 0, bestColor = '#fff';

    const qqqNextOpen = getQqqNextOpen(targetDate);

    for (const { ticker, color } of SYMBOLS) {
      const entry = tickerMap.get(ticker);
      if (!entry) continue;
      const { longScore } = entry;

      // QQQ future signal (historical: next-day open × beta)
      let futSignal = 0, futHasData = false;
      const fb = calcQqqOpenBeta(ticker);
      if (qqqNextOpen != null && fb.pts >= 10) {
        const fopScore = (fb.beta * qqqNextOpen) / 1.5;
        futSignal = fopScore;
        futHasData = true;
      }

      const rfEntry = _cachedRfModel?.preds?.[targetDate]?.[ticker];
      const dlEntry = _cachedDlModel?.preds?.[targetDate]?.[ticker];
      const rfProb  = rfEntry ? rfEntry.prob : null;
      const dlProb  = dlEntry ? dlEntry.prob : null;

      const futW  = futHasData ? 0.34 : 0;
      const dlW   = dlProb  != null ? 0.32 : 0;
      const rfW   = rfProb  != null ? 0.30 : 0;
      const ruleW = Math.max(0.04, 1 - futW - dlW - rfW);
      const total = futW + dlW + rfW + ruleW;

      const rfSignal   = rfProb  != null ? (rfProb  - 0.5) * 2 : 0;
      const dlSignal   = dlProb  != null ? (dlProb  - 0.5) * 2 : 0;
      const ruleSignal = longScore;

      let combinedScore = (futSignal*futW + dlSignal*dlW + rfSignal*rfW + ruleSignal*ruleW) / total;

      if (Math.abs(combinedScore) > bestAbsScore) {
        bestAbsScore = Math.abs(combinedScore);
        bestScore = combinedScore;
        bestTicker = ticker;
        bestColor = color;
      }
    }

    if (!bestTicker || bestAbsScore < 0.05) continue;

    const d = stockData[bestTicker];
    const ni = d ? d.dates.indexOf(nextDate) : -1;
    const actual = ni >= 0 && d.changes[ni] != null ? d.changes[ni] : null;
    if (actual === null) continue;

    const isHit = bestScore > 0 ? actual > 0 : actual < 0;
    if (isHit) hit++;
    tot++;
    details.push({ date: targetDate, ticker: bestTicker, score: bestScore, actual, hit: isHit, color: bestColor });
  }

  return { hit, tot, rate: tot > 0 ? hit / tot : null, details };
}

// 构建开盘规则引擎用的 obs 对象（与后端 build_observations 结构一致）
function buildOpenObs(ticker, targetDate) {
  const d = stockData[ticker];
  if (!d) return null;
  const idx = _stockDateIdx[ticker];
  const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
  if (ti < 0 || d.changes[ti] == null) return null;

  const qqq = stockData['QQQ'];
  let qqqRet1=null, qqqRet3=null, qqqRet5=null, qqqNextOpen=null;
  if (qqq) {
    const qi = _qqqDateIdx ? (_qqqDateIdx.get(targetDate) ?? -1) : qqq.dates.indexOf(targetDate);
    if (qi >= 0) {
      const qc = qqq.changes;
      qqqRet1 = qc[qi];
      if (qi >= 2 && [0,1,2].every(j=>qc[qi-j]!=null)) qqqRet3 = qc[qi]+qc[qi-1]+qc[qi-2];
      if (qi >= 4 && [0,1,2,3,4].every(j=>qc[qi-j]!=null)) qqqRet5 = [0,1,2,3,4].reduce((s,j)=>s+qc[qi-j],0);
    }
  }

  const allDatesSorted = Object.keys(_stockDateIdx[ticker] ? Object.fromEntries(_stockDateIdx[ticker]) : {}).sort();
  const dateIdx2 = allDatesSorted.indexOf(targetDate);
  const sortedAll = SYMBOLS.map(s => {
    const dd = stockData[s.ticker];
    if (!dd) return null;
    const ii = _stockDateIdx[s.ticker]?.get(targetDate) ?? dd.dates.indexOf(targetDate);
    if (ii < 0 || dd.changes[ii] == null) return null;
    return { ticker: s.ticker, todayChg: dd.changes[ii] };
  }).filter(Boolean);
  const rankSorted = [...sortedAll].sort((a,b) => b.todayChg - a.todayChg);
  const rank = rankSorted.findIndex(e => e.ticker === ticker) + 1;
  const marketUpCount = sortedAll.filter(e => e.todayChg > 0).length;

  const sc = d.changes;
  const pi = ti > 0 ? ti - 1 : -1;
  let aboveMa5=null, aboveMa10=null, aboveMa20=null;
  if (ti >= 20) {
    const cl = d.closes || [];
    const c = cl[ti];
    if (c) {
      const s5=[0,1,2,3,4].map(j=>cl[ti-j]).filter(v=>v); if(s5.length===5) aboveMa5 = c > s5.reduce((a,b)=>a+b)/5;
      const s10=[...Array(10)].map((_,j)=>cl[ti-j]).filter(v=>v); if(s10.length===10) aboveMa10 = c > s10.reduce((a,b)=>a+b)/10;
      const s20=[...Array(20)].map((_,j)=>cl[ti-j]).filter(v=>v); if(s20.length===20) aboveMa20 = c > s20.reduce((a,b)=>a+b)/20;
    }
  }
  let excess1=null, excess3=null, excess5=null;
  if (sc[ti]!=null && qqqRet1!=null) excess1 = +(sc[ti]-qqqRet1).toFixed(2);
  if (qqqRet3!=null && ti>=2 && [0,1,2].every(j=>sc[ti-j]!=null)) excess3 = +((sc[ti]+sc[ti-1]+sc[ti-2])-qqqRet3).toFixed(2);
  if (qqqRet5!=null && ti>=4 && [0,1,2,3,4].every(j=>sc[ti-j]!=null)) excess5 = +([0,1,2,3,4].reduce((s,j)=>s+sc[ti-j],0)-qqqRet5).toFixed(2);
  const dr = d.dayRanges || [];
  const drVals = [0,1,2,3,4].map(j=>dr[ti-j]).filter(v=>v!=null);
  const atr5 = drVals.length ? +(drVals.reduce((a,b)=>a+b)/drVals.length).toFixed(2) : null;
  let week5=null, qqqWeek5=null, excessWeek5=null;
  if (ti>=4 && [0,1,2,3,4].every(j=>sc[ti-j]!=null)) week5 = +([0,1,2,3,4].reduce((s,j)=>s+sc[ti-j],0)).toFixed(2);
  if (week5!=null && qqqRet5!=null) { qqqWeek5=+qqqRet5.toFixed(2); excessWeek5=+(week5-qqqWeek5).toFixed(2); }
  const oc = d.openChanges || [];
  const todayOpenChg = ti < oc.length ? oc[ti] : null;

  return {
    ticker, rank, marketUpCount,
    todayChg: sc[ti], prevChg: pi>=0 ? sc[pi] : null,
    qqqRet1, qqqRet3, qqqRet5, qqqNextOpen,
    aboveMa5, aboveMa10, aboveMa20,
    excess1, excess3, excess5, atr5,
    week5, qqqWeek5, excessWeek5,
    todayOpenChg,
  };
}

// 渲染开盘信号（均值回归 + 规则引擎 + RF + GRU 综合权重）
function renderOpenSignalForDate(targetDate, allDates) {
  const verdictRow   = document.getElementById('verdict-row');
  const rulesTitleEl = document.getElementById('sig-rules-title');
  const rulesList    = document.getElementById('sig-rules-list');
  if (!verdictRow) return;

  const isLatest = targetDate === allDates[allDates.length - 1];
  const dateIdx  = allDates.indexOf(targetDate);
  const nextDate = dateIdx >= 0 && dateIdx < allDates.length - 1 ? allDates[dateIdx + 1] : null;

  for (const { ticker } of SYMBOLS) calcOpenToBeta(ticker);

  const rows = SYMBOLS.map(({ ticker, color, name }) => {
    const d = stockData[ticker];
    if (!d) return null;
    const idx = _stockDateIdx[ticker];
    const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
    if (ti < 0 || d.changes[ti] == null) return null;

    const fb = calcOpenToBeta(ticker);

    // 次日开盘跳空
    let nextOpenChg = null, isRealtime = false;
    if (isLatest) {
      const nqNow = futuresData['NQ=F']?.intradayChg ?? futuresHistory['NQ=F']?.intradayChg;
      if (nqNow != null) { nextOpenChg = nqNow * 0.8; isRealtime = true; }
    } else {
      nextOpenChg = getNextOpenChg(ticker, targetDate);
    }

    // 均值回归信号（原有模型）
    let mrevDir = 'neut', mrevScore = 0, winRateEst = null, winRateN = null;
    if (nextOpenChg != null) {
      mrevScore = Math.abs(nextOpenChg);
      const sig = getOpenGapSignal(ticker, nextOpenChg);
      mrevDir = sig.dir; winRateEst = sig.winRateEst; winRateN = sig.n ?? null;
    }

    // 开盘规则引擎信号（用 openRuleHits）
    let ruleOpenScore = 0;
    if (_cachedOpenRuleHits?.[ticker] && _cachedAllConds) {
      const obs = buildOpenObs(ticker, targetDate);
      if (obs) {
        const tickerHits = _cachedOpenRuleHits[ticker];
        let wSum = 0, wTot = 0;
        for (const cond of _cachedAllConds) {
          if (!cond.fn(obs)) continue;
          const arr = tickerHits[cond.key];
          if (!arr) continue;
          let lo2=0, hi2=arr.length;
          while (lo2 < hi2) { const mid=(lo2+hi2)>>>1; arr[mid].date < targetDate ? lo2=mid+1 : hi2=mid; }
          const n = lo2;
          if (n < 3) continue;
          const wins = arr.slice(0, n).filter(h => h.nextOpenChg > 0).length;
          const wr = wins / n;
          wSum += (wr - 0.5) * n;
          wTot += n;
        }
        ruleOpenScore = wTot > 0 ? wSum / wTot : 0;
      }
    }
    const ruleOpenDir = ruleOpenScore > 0.05 ? 'long' : ruleOpenScore < -0.05 ? 'short' : 'neut';

    // 随机森林开盘信号
    let rfOpenDir = 'neut', rfOpenProb = null;
    if (_cachedRfOpenModel?.preds) {
      const e = _cachedRfOpenModel.preds[targetDate]?.[ticker];
      if (e) { rfOpenDir = e.dir; rfOpenProb = e.prob; }
    }

    // 深度学习开盘信号
    let dlOpenDir = 'neut', dlOpenProb = null;
    if (_cachedDlOpenModel?.preds) {
      const e = _cachedDlOpenModel.preds[targetDate]?.[ticker];
      if (e) { dlOpenDir = e.dir; dlOpenProb = e.prob; }
    }

    // 综合权重：均值回归45% + 规则引擎10% + RF22% + GRU23%
    const hasRF  = rfOpenProb  != null;
    const hasDL  = dlOpenProb  != null;
    const W_MREV = 0.45;
    const W_RULE = 0.10;
    const W_RF   = hasRF ? 0.22 : 0;
    const W_DL   = hasDL ? 0.23 : 0;
    const total  = W_MREV + W_RULE + W_RF + W_DL || 1;
    const mrevSignal = mrevDir === 'long' ? 1 : mrevDir === 'short' ? -1 : 0;
    const rfSignal   = rfOpenProb  != null ? (rfOpenProb  - 0.5) * 2 : 0;
    const dlSignal   = dlOpenProb  != null ? (dlOpenProb  - 0.5) * 2 : 0;
    let combinedOpenScore = (mrevSignal*W_MREV + ruleOpenScore*W_RULE + rfSignal*W_RF + dlSignal*W_DL) / total;

    // 未命中规律过滤
    const openObsCheck = { todayOpenChg: nextOpenChg, todayChg: d.changes[ti],
                           atr5: (d.dayRanges||[]).slice(Math.max(0,ti-4),ti+1).filter(v=>v!=null).reduce((a,b,_,arr)=>a+b/arr.length,0)||null,
                           marketUpCount: (() => { const sorted2=SYMBOLS.map(s2=>{const dd=stockData[s2.ticker];if(!dd)return null;const ii=_stockDateIdx[s2.ticker]?.get(targetDate)??dd.dates.indexOf(targetDate);return ii>=0&&dd.changes[ii]!=null?dd.changes[ii]:null;}).filter(v=>v!=null);return sorted2.filter(v=>v>0).length;})(),
                           qqqRet1: (() => {const qqq=stockData['QQQ'];if(!qqq)return null;const qi=_qqqDateIdx?.get(targetDate)??qqq.dates.indexOf(targetDate);return qi>=0?qqq.changes[qi]:null;})() };
    const openFiltered = checkMissFilter(openObsCheck, _cachedMissPatterns?.openFilters);
    if (openFiltered) combinedOpenScore = combinedOpenScore * 0.3;

    const openDir  = combinedOpenScore > 0.05 ? 'long' : combinedOpenScore < -0.05 ? 'short' : 'neut';

    const qqqNextOpen = isLatest
      ? (futuresData['NQ=F']?.intradayChg ?? null)
      : getQqqNextOpen(targetDate);

    const actualOtc   = nextDate ? getNextOpenToClose(ticker, targetDate) : null;
    const actualClose = nextDate ? (() => {
      const ni = d.dates.indexOf(nextDate);
      return ni >= 0 ? d.changes[ni] : null;
    })() : null;

    return { ticker, color, name,
      todayChg: d.changes[ti],
      todayOtc: (d.openToClose || [])[ti],
      todayOpenChg: (d.openChanges || [])[ti] ?? null,
      nextOpenChg, isRealtime,
      openDir, combinedOpenScore, mrevDir, winRateEst, winRateN,
      ruleOpenDir, ruleOpenScore,
      rfOpenDir, rfOpenProb,
      dlOpenDir, dlOpenProb,
      openFiltered,
      qqqNextOpen, actualOtc, actualClose, fb };
  }).filter(Boolean);

  if (!rows.length) {
    verdictRow.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">该日期无数据</div>';
    return;
  }

  const hasRF  = rows.some(r => r.rfOpenProb  != null);
  const hasDL  = rows.some(r => r.dlOpenProb  != null);

  // 按历史胜率排名：winRateEst 高的在前，无胜率的排最后
  rows.sort((a, b) => {
    const wa = a.winRateEst ?? 0;
    const wb = b.winRateEst ?? 0;
    if (wb !== wa) return wb - wa;
    return Math.abs(b.combinedOpenScore) - Math.abs(a.combinedOpenScore);
  });

  const longCnt  = rows.filter(r => r.openDir === 'long').length;
  const shortCnt = rows.filter(r => r.openDir === 'short').length;
  const overallOpenDir = longCnt >= shortCnt ? 'long' : 'short';
  const overallWord    = overallOpenDir === 'long' ? '开盘做多' : '开盘做空';

  const hasActuals = rows.some(r => r.actualOtc != null);
  const validPred  = rows.filter(r => r.openDir !== 'neut' && r.actualOtc != null);
  const hitCount   = validPred.filter(r => r.openDir === 'long' ? r.actualOtc > 0 : r.actualOtc < 0).length;
  const hitRate    = hasActuals && validPred.length ? hitCount / validPred.length : null;

  const qqqOC = rows[0]?.qqqNextOpen;

  // ── Verdict ──
  verdictRow.innerHTML = '';
  const main = document.createElement('div');
  main.className = `verdict-main ${overallOpenDir}`;

  const dateLabel = isLatest ? '明日开盘建议' : `${fmtDate(targetDate)} 开盘后建议`;
  let hrHtml = '';
  if (hitRate !== null) {
    const rc = hitRate >= 0.6 ? '#3fb950' : hitRate >= 0.4 ? '#e3b341' : '#f85149';
    hrHtml = `<div style="margin-top:8px;padding:6px 10px;border-radius:7px;background:#0d1117;font-size:12px">
      开盘信号命中率 <strong style="color:${rc};font-size:15px">${Math.round(hitRate*100)}%</strong>
      <span style="color:var(--muted);font-size:10px"> (${hitCount}/${validPred.length}只·开盘→收盘)</span>
    </div>`;
  }

  let modelBadges = '';
  if (hasRF || hasDL) {
    const rfStat = _cachedRfOpenModel?.stat;
    const dlStat = _cachedDlOpenModel?.stat;
    modelBadges = `<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
      ${rfStat ? `<span style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(240,136,62,0.15);color:#f0883e;border:1px solid #f0883e44">RF开盘 ${(rfStat.rate*100).toFixed(1)}%</span>` : ''}
      ${dlStat ? `<span style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(163,113,247,0.15);color:#a371f7;border:1px solid #a371f744">GRU开盘 ${(dlStat.rate*100).toFixed(1)}%</span>` : ''}
    </div>`;
  }

  let qqqBar = '';
  if (qqqOC != null) {
    const qc = qqqOC >= 0 ? '#3fb950' : '#f85149';
    qqqBar = `<div style="margin-top:8px;padding:6px 10px;border-radius:7px;background:#0d1117;font-size:11px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="color:var(--muted)">${isLatest ? 'NQ=F盘中（代理开盘）' : '次日QQQ开盘'}</span>
      <span style="color:${qc};font-weight:700">${qqqOC>0?'+':''}${qqqOC.toFixed(2)}%</span>
      <span style="color:var(--muted);font-size:10px">→ 预测开盘后走向</span>
    </div>`;
  }

  main.innerHTML = `
    <div class="verdict-label">${dateLabel}</div>
    <div class="verdict-word">${overallWord}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">
      均值回归 + 规则 + RF + GRU 综合权重 &nbsp;·&nbsp;
      <span style="font-size:10px">看多 ${longCnt} 只 / 看空 ${shortCnt} 只</span>
    </div>
    ${modelBadges}
    ${qqqBar}
    ${hrHtml}
  `;
  verdictRow.appendChild(main);

  // ── 每只股票信号表格 ──
  const tableWrap = document.createElement('div');
  tableWrap.className = 'verdict-stocks';

  const extraCols = (hasRF ? ' 48px' : '') + (hasDL ? ' 48px' : '');
  const cols = `40px 56px 64px 52px 14px${extraCols}${hasActuals ? ' 62px 62px 52px' : ''}`;
  const hdr = `<div style="font-size:10px;color:var(--muted);padding:3px 10px 5px;
    display:grid;grid-template-columns:${cols};gap:6px;align-items:center">
    <span>标的</span>
    <span style="text-align:center;color:#e3b341">综合信号</span>
    <span style="text-align:center">开盘跳空</span>
    <span style="text-align:center">当日收盘</span>
    <span></span>
    ${hasRF ? `<span style="text-align:center;color:#f0883e">RF</span>` : ''}
    ${hasDL ? `<span style="text-align:center;color:#a371f7">GRU</span>` : ''}
    ${hasActuals ? `<span style="text-align:center">次日开盘</span><span style="text-align:center">开盘→收盘</span><span style="text-align:center">结果</span>` : ''}
  </div>`;

  const rowHtmls = rows.map((r, idx) => {
    const dirColor = r.openDir === 'long' ? '#3fb950' : r.openDir === 'short' ? '#f85149' : '#8b949e';
    const dirWord  = r.openDir === 'long' ? '▲ 做多' : r.openDir === 'short' ? '▼ 做空' : '— 中性';
    const dirBg    = r.openDir === 'long' ? 'rgba(63,185,80,0.12)' : r.openDir === 'short' ? 'rgba(248,81,73,0.12)' : 'transparent';
    const openStr  = r.todayOpenChg != null
      ? `<span style="color:${r.todayOpenChg>=0?'#3fb950':'#f85149'}">${r.todayOpenChg>0?'+':''}${r.todayOpenChg.toFixed(2)}%</span>${r.isRealtime?'<br><span style="font-size:9px;color:#8b949e">NQ代理</span>':''}`
      : '—';
    const todayColor = r.todayChg >= 0 ? '#3fb950' : '#f85149';
    const barPct = Math.min(100, Math.abs(r.combinedOpenScore) / 0.3 * 100).toFixed(0);

    const wrStr = r.winRateEst != null
      ? `<br><span style="font-size:9px;color:${r.winRateEst>=0.65?'#3fb950':'#e3b341'};font-weight:400">均回${(r.winRateEst*100).toFixed(0)}%(${r.winRateN??''}次)</span>` : '';

    let rfHtml = '', dlHtml = '';
    if (hasRF) {
      const p = r.rfOpenProb;
      const c = p == null ? '#8b949e' : p > 0.55 ? '#3fb950' : p < 0.45 ? '#f85149' : '#8b949e';
      rfHtml = `<span style="font-size:10px;text-align:center;color:${c}">${p != null ? (p*100).toFixed(0)+'%' : '—'}</span>`;
    }
    if (hasDL) {
      const p = r.dlOpenProb;
      const c = p == null ? '#8b949e' : p > 0.58 ? '#3fb950' : p < 0.42 ? '#f85149' : '#8b949e';
      dlHtml = `<span style="font-size:10px;text-align:center;color:${c}">${p != null ? (p*100).toFixed(0)+'%' : '—'}</span>`;
    }

    let actHtml = '';
    if (hasActuals) {
      const noc  = r.nextOpenChg;
      const aotc = r.actualOtc;
      const nocColor  = noc  == null ? '#8b949e' : noc  >= 0 ? '#3fb950' : '#f85149';
      const otcColor  = aotc == null ? '#8b949e' : aotc >= 0 ? '#3fb950' : '#f85149';
      const hit = aotc == null || r.openDir === 'neut' ? null
        : r.openDir === 'long' ? aotc > 0 : aotc < 0;
      const hitBg    = hit === null ? 'transparent' : hit ? 'rgba(63,185,80,0.15)' : 'rgba(248,81,73,0.15)';
      const hitColor = hit === null ? '#8b949e' : hit ? '#3fb950' : '#f85149';
      const hitWord  = hit === null ? '—' : hit ? '✓ 命中' : '✗ 未中';
      actHtml = `
        <span style="color:${nocColor};font-size:11px;text-align:center">${noc!=null?(noc>0?'+':'')+noc.toFixed(2)+'%':'—'}</span>
        <span style="color:${otcColor};font-size:11px;text-align:center">${aotc!=null?(aotc>0?'+':'')+aotc.toFixed(2)+'%':'—'}</span>
        <span style="background:${hitBg};color:${hitColor};font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;text-align:center;border:1px solid ${hit===null?'transparent':hitColor+'55'}">${hitWord}</span>`;
    }

    return `<div class="vs-row" style="display:grid;grid-template-columns:${cols};gap:6px;align-items:center;${idx===0?`border-color:${dirColor};`:''}">
      <span style="color:${r.color};font-weight:700;font-size:11px">${idx===0?'⭐':''} ${r.ticker}</span>
      <span style="background:${dirBg};color:${dirColor};font-weight:700;font-size:11px;padding:3px 5px;border-radius:6px;text-align:center;border:1px solid ${dirColor+'55'}${r.openFiltered?';opacity:0.55':''}">
        ${dirWord}${wrStr}${r.openFiltered?'<br><span style="font-size:8px;color:#e3b341;font-weight:400">⚠过滤</span>':''}
        <div style="height:2px;background:#21262d;border-radius:1px;margin-top:3px;overflow:hidden"><div style="height:100%;width:${barPct}%;background:${dirColor};border-radius:1px"></div></div>
      </span>
      <span style="font-size:11px;text-align:center">${openStr}</span>
      <span style="color:${todayColor};font-size:11px;text-align:center">${r.todayChg>0?'+':''}${r.todayChg.toFixed(2)}%</span>
      <span style="color:#8b949e;font-size:12px;text-align:center">→</span>
      ${rfHtml}${dlHtml}
      ${actHtml}
    </div>`;
  });

  tableWrap.innerHTML = hdr + rowHtmls.join('');
  verdictRow.appendChild(tableWrap);

  if (rulesTitleEl) rulesTitleEl.innerHTML = `
    <span style="color:#e3b341">🌅 开盘信号</span>：均值回归(45%) + 规则引擎(10%) + RF(22%) + GRU(23%) 综合权重，预测开盘→收盘方向`;
  if (rulesList) {
    rulesList.innerHTML = rows.map(r => {
      if (r.openDir === 'neut') return '';
      const bc = r.fb.beta >= 0 ? '#3fb950' : '#f85149';
      const wr = calcWinRate(r.fb.xPts, r.nextOpenChg || 0);
      const wrStr = wr ? `历史同向胜率 <strong style="color:${wr.rate>=0.6?'#3fb950':wr.rate>=0.5?'#e3b341':'#f85149'}">${(wr.rate*100).toFixed(0)}%</strong>（${wr.n}次）` : `样本量 ${r.fb.pts} 次`;
      return `<div class="sig-rule-item" style="border-color:${r.color}22">
        <span class="sri-ticker" style="color:${r.color}">${r.ticker}</span>
        <span class="sri-desc">beta <strong style="color:${bc}">${r.fb.beta.toFixed(3)}</strong>（均值回归）</span>
        <span class="sri-wr">${wrStr}</span>
        <span style="color:var(--muted);font-size:10px">样本 ${r.fb.pts} 天</span>
        <span class="sri-dir" style="color:${r.openDir==='long'?'#3fb950':'#f85149'}">${r.openDir==='long'?'↑ 看多':'↓ 看空'}</span>
      </div>`;
    }).join('');
  }
  const missEl = document.getElementById('miss-analysis');
  if (missEl) missEl.innerHTML = '';
}

function buildComboConds() {
  if (_cachedComboConds) return _cachedComboConds;
  const rankConds  = CONDITIONS.filter(c => c.key.startsWith('rank_'));
  const otherConds = CONDITIONS.filter(c => !c.key.startsWith('rank_') && !c.key.startsWith('top') && !c.key.startsWith('bot') && !c.key.startsWith('short_'));
  const shortConds = CONDITIONS.filter(c => c.key.startsWith('short_'));
  const mktConds   = CONDITIONS.filter(c => c.key.startsWith('mkt_'));
  const combos = [];
  rankConds.forEach(r => {
    otherConds.forEach(x => {
      combos.push({ key: `${r.key}__${x.key}`, label: `${r.label} &amp; ${x.label}`, fn: o => r.fn(o) && x.fn(o) });
    });
  });
  shortConds.forEach(s => {
    mktConds.forEach(m => {
      combos.push({ key: `${s.key}__${m.key}`, label: `${s.label} &amp; ${m.label}`, fn: o => s.fn(o) && m.fn(o) });
    });
  });
  _cachedComboConds = combos;
  return combos;
}

// ── Rule Miner ───────────────────────────────────────────────────
function renderMiner() {
  const el = document.getElementById('rule-list');
  if (!el) return;

  if (!_cachedRuleHits) {
    el.innerHTML = `<div class="no-rules" style="color:var(--muted)">⏳ 后台计算中，请稍候…</div>`;
    return;
  }

  const dir    = document.getElementById('miner-dir')?.value || 'long';
  const target = document.getElementById('miner-target')?.value || 'winrate';
  const topN   = +(document.getElementById('miner-topn')?.value || 5);
  const isShort = dir === 'short';

  const allConds = _cachedAllConds || [...CONDITIONS, ...buildComboConds()];
  const ruleHits = _cachedRuleHits || {};

  const results = [];
  allConds.forEach(cond => {
    let upCnt = 0, dnCnt = 0, sumChg = 0, n = 0;
    SYMBOLS.forEach(({ ticker }) => {
      const hits = ruleHits[ticker]?.[cond.key];
      if (!hits || !hits.length) return;
      const len = hits.length;
      const w = hits._pfWins ? hits._pfWins[len] : hits.reduce((s,h)=>s+(h.nextChg>0?1:0),0);
      n      += len;
      upCnt  += w;
      dnCnt  += len - w;
      sumChg += hits._pfSum ? hits._pfSum[len] : hits.reduce((s,h)=>s+h.nextChg,0);
    });
    if (n < 3) return;
    const longWr  = upCnt / n;
    const shortWr = dnCnt / n;
    const avg     = sumChg / n;
    const score = target === 'winrate'
      ? (isShort ? shortWr : longWr)
      : target === 'avgret'
        ? (isShort ? -avg : avg)
        : (isShort ? shortWr : longWr) * 0.6 + ((isShort ? -avg : avg) / 5) * 0.4;
    const displayWr   = isShort ? shortWr : longWr;
    const displayAvg  = isShort ? -avg : avg;
    const displayWins = isShort ? dnCnt : upCnt;
    results.push({ label: cond.label, n, displayWins, displayWr, displayAvg, score });
  });

  results.sort((a, b) => b.score - a.score);
  const top = results.slice(0, topN);

  if (!top.length) {
    el.innerHTML = `<div class="no-rules">没有满足条件的规则（样本量不足）</div>`;
    return;
  }

  const dirLabel = isShort
    ? '<span style="color:#f85149;font-size:11px;margin-bottom:8px;display:block">▼ 做空信号 · 胜率 = 触发条件后次日下跌概率 · 收益 = 做空获利</span>'
    : '<span style="color:#3fb950;font-size:11px;margin-bottom:8px;display:block">▲ 做多信号 · 胜率 = 触发条件后次日上涨概率 · 收益 = 做多获利</span>';
  el.innerHTML = dirLabel;

  top.forEach((r, idx) => {
    const wrColor  = r.displayWr >= 0.7 ? (isShort ? '#f85149' : '#3fb950') : r.displayWr >= 0.55 ? '#e3b341' : (isShort ? '#3fb950' : '#f85149');
    const avgColor = r.displayAvg >= 0 ? (isShort ? '#f85149' : '#3fb950') : (isShort ? '#3fb950' : '#f85149');
    const medal    = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}.`;
    const rowClass = idx === 0 ? 'rule-row top1' : idx === 1 ? 'rule-row top2' : 'rule-row';
    const winLabel = isShort ? '次日↓' : '次日↑';
    const div = document.createElement('div');
    div.className = rowClass;
    if (isShort) div.style.borderColor = idx === 0 ? '#f85149' : idx === 1 ? 'rgba(248,81,73,0.5)' : '';
    div.innerHTML = `
      <div class="rule-desc">${medal} ${r.label}</div>
      <div class="rule-wr" style="color:${wrColor}">${Math.round(r.displayWr*100)}%</div>
      <div class="rule-avg" style="color:${avgColor}">均 ${r.displayAvg>0?'+':''}${r.displayAvg.toFixed(2)}%</div>
      <div class="rule-n">${r.displayWins}/${r.n}次${winLabel}</div>
    `;
    el.appendChild(div);
  });
}

// ── Model PK ─────────────────────────────────────────────────────
function renderModelPK() {
  const scoreEl = document.getElementById('pk-scoreboard');
  const tableEl = document.getElementById('pk-history-table');
  if (!scoreEl || !tableEl) return;

  if (!_cachedModelPK) {
    scoreEl.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);font-size:12px">⏳ 后台计算中…</div>`;
    tableEl.innerHTML = '';
    return;
  }

  const pk  = _cachedModelPK;
  const rf  = _cachedRfModel;
  const dl  = _cachedDlModel;
  const rfStat = rf?.stat;
  const dlStat = dl?.stat;
  const rates   = [pk.rule.rate, pk.lr.rate, pk.fut.rate, rfStat?.rate ?? 0, dlStat?.rate ?? 0];
  const maxRate = Math.max(...rates);
  const fmtCard = (name, stat, color, isWinner) => `
    <div class="pk-card ${isWinner ? 'winner' : ''}">
      ${isWinner ? '<div class="pk-crown">🏆</div>' : ''}
      <div class="pk-name">${name}</div>
      <div class="pk-rate" style="color:${color}">${Math.round(stat.rate*100)}%</div>
      <div class="pk-detail">${stat.hit}/${stat.tot} 次命中</div>
    </div>`;

  const ruleC = pk.rule.rate >= 0.6 ? '#3fb950' : pk.rule.rate >= 0.5 ? '#e3b341' : '#f85149';
  const lrC   = pk.lr.rate   >= 0.6 ? '#58a6ff' : pk.lr.rate   >= 0.5 ? '#e3b341' : '#f85149';
  const futC  = pk.fut.rate  >= 0.6 ? '#d2a8ff' : pk.fut.rate  >= 0.5 ? '#e3b341' : '#f85149';
  const rfC   = rfStat        ? (rfStat.rate >= 0.6 ? '#f0883e' : rfStat.rate >= 0.5 ? '#e3b341' : '#f85149') : '#8b949e';
  const dlC   = dlStat        ? (dlStat.rate >= 0.6 ? '#a371f7' : dlStat.rate >= 0.5 ? '#e3b341' : '#f85149') : '#8b949e';

  // 按胜率反推的综合权重（固定，不用网格搜索的1.0/0/0）
  const hasDlStat = !!dlStat, hasRfStat = !!rfStat;
  const w_fut  = 0.34, w_dl = hasDlStat ? 0.32 : 0, w_rf = hasRfStat ? 0.30 : 0;
  const w_rule = Math.max(0.04, 1 - w_fut - w_dl - w_rf);
  const bestHtml = `
    <div style="grid-column:1/-1;margin-top:10px;padding:8px 12px;background:#0d1117;border-radius:8px;
      border:1px solid #3fb95055;font-size:11px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <span style="color:#3fb950;font-weight:700">⚖️ 综合权重（按胜率反推）</span>
      <span>QQQ开盘 <strong style="color:#d2a8ff">${(w_fut*100).toFixed(0)}%</strong></span>
      ${hasDlStat ? `<span>深度学习 <strong style="color:#a371f7">${(w_dl*100).toFixed(0)}%</strong></span>` : ''}
      ${hasRfStat ? `<span>随机森林 <strong style="color:#f0883e">${(w_rf*100).toFixed(0)}%</strong></span>` : ''}
      <span>规则引擎 <strong style="color:#8b949e">${(w_rule*100).toFixed(0)}%</strong></span>
    </div>`;

  // 随机森林特征重要性
  const rfImportHtml = rf?.importances?.length ? `
    <div style="grid-column:1/-1;margin-top:10px;padding:8px 12px;background:#0d1117;border-radius:8px;
      border:1px solid #f0883e44;font-size:11px">
      <div style="color:#f0883e;font-weight:700;margin-bottom:6px">🌲 随机森林 · 特征重要性（Top 10）</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${rf.importances.map(f => {
          const pct = (f.importance * 100).toFixed(1);
          const w   = Math.round(f.importance / rf.importances[0].importance * 100);
          return `<div style="display:flex;align-items:center;gap:4px;min-width:160px">
            <div style="width:${w}px;max-width:80px;height:6px;background:#f0883e;border-radius:3px;flex-shrink:0"></div>
            <span style="color:#cdd9e5">${f.feature}</span>
            <span style="color:var(--muted)">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:6px;color:var(--muted);font-size:10px">
        训练集 ${rf.trainSize} 条 · 测试集 ${rf.testSize} 条 · 概率阈值 &gt;55% 才发信号
      </div>
    </div>` : '';

  const nCards = 3 + (rfStat?1:0) + (dlStat?1:0);
  scoreEl.style.gridTemplateColumns = `repeat(${nCards}, 1fr)`;
  const dlInfoHtml = dl ? `
    <div style="grid-column:1/-1;margin-top:8px;padding:6px 12px;background:#0d1117;border-radius:8px;
      border:1px solid #a371f744;font-size:11px;color:var(--muted)">
      <span style="color:#a371f7;font-weight:700">🧠 深度学习</span>
      &nbsp;· GRU 集成（${dl.nModels} 个模型）· 窗口 15 日 · 概率阈值 ${(dl.threshold*100).toFixed(0)}%
      &nbsp;· 训练 ${dl.trainSize} 条 · 测试 ${dl.testSize} 条
    </div>` : '';
  scoreEl.innerHTML =
    fmtCard('规则引擎（次日）', pk.rule, ruleC, pk.rule.rate === maxRate) +
    fmtCard('LR回归（当日）',   pk.lr,   lrC,   pk.lr.rate   === maxRate) +
    fmtCard('QQQ开盘（次日）',  pk.fut,  futC,  pk.fut.rate  === maxRate) +
    (rfStat ? fmtCard('随机森林（次日）', rfStat, rfC, rfStat.rate === maxRate) : '') +
    (dlStat ? fmtCard('深度学习·GRU（次日）', dlStat, dlC, dlStat.rate === maxRate) : '') +
    bestHtml + rfImportHtml + dlInfoHtml;

  const recent = (pk.days || []).slice(-30).reverse();
  tableEl.innerHTML = `
    <thead>
      <tr>
        <th>日期</th><th>标的</th>
        <th style="color:#8b949e">规则引擎</th>
        <th style="color:#58a6ff">LR回归</th>
        <th style="color:#d2a8ff">QQQ开盘</th>
      </tr>
    </thead>
    <tbody id="pk-tbody"></tbody>
  `;
  const tbody = tableEl.querySelector('tbody');
  recent.forEach(({ date, stocks }) => {
    stocks.forEach((s, i) => {
      const tr = document.createElement('tr');
      const mkColor = v => v == null ? '#8b949e' : v >= 0 ? '#3fb950' : '#f85149';
      const mkBadge = (dir, actual, cls1, cls2, suffix) => {
        const word = dir === 'long' ? '▲做多' : dir === 'short' ? '▼做空' : '—观望';
        const hit  = dir === 'neut' || actual === null ? null : (dir === 'long' ? actual > 0 : actual < 0);
        const cls  = dir === 'neut' ? 'neut' : hit ? cls1 : cls2;
        const actStr = actual !== null ? `<span style="color:${mkColor(actual)};font-size:10px;margin-left:3px">${actual>0?'+':''}${actual.toFixed(2)}%${suffix}</span>` : '';
        return `<span class="pk-badge ${cls}">${word}</span>${actStr}`;
      };
      tr.innerHTML = `
        <td style="color:var(--muted);white-space:nowrap">${i===0 ? fmtDate(date) : ''}</td>
        <td style="color:${s.color};font-weight:700">${s.ticker}</td>
        <td>${mkBadge(s.ruleDir,  s.actualNext,  'hit-rule', 'miss-rule', '次日')}</td>
        <td>${mkBadge(s.lrDir,   s.actualToday, 'hit-lr',   'miss-lr',   '当日')}</td>
        <td>${mkBadge(s.futDir,  s.actualNext,  'hit-rule', 'miss-rule', '次日')}</td>
      `;
      tbody.appendChild(tr);
    });
  });
}

// ── Rank Winrate ─────────────────────────────────────────────────
function renderRankWinrate() {
  const cardsEl = document.getElementById('rank-cards');
  const tableEl = document.getElementById('rank-detail');
  if (!cardsEl || !tableEl) return;

  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const sortedDates = [...allDatesSet].sort();

  const rankStats = Array.from({ length: 7 }, () => ({ wins: 0, total: 0, nextChanges: [] }));
  const detailRows = [];

  for (let di = 0; di < sortedDates.length - 1; di++) {
    const today    = sortedDates[di];
    const tomorrow = sortedDates[di + 1];
    const entries  = SYMBOLS.map(({ ticker, name, color }) => {
      const d = stockData[ticker];
      if (!d) return null;
      const ti = d.dates.indexOf(today);
      const ni = d.dates.indexOf(tomorrow);
      if (ti < 0 || d.changes[ti] == null) return null;
      return { ticker, name, color, todayChg: d.changes[ti], nextChg: (ni >= 0 && d.changes[ni] != null) ? d.changes[ni] : null };
    }).filter(Boolean);
    if (entries.length < 2) continue;
    entries.sort((a, b) => b.todayChg - a.todayChg);
    const row = { date: today, entries: [] };
    entries.forEach((e, rankIdx) => {
      row.entries.push({ ...e, rank: rankIdx + 1 });
      if (e.nextChg !== null && rankIdx < rankStats.length) {
        rankStats[rankIdx].total++;
        if (e.nextChg > 0) rankStats[rankIdx].wins++;
        rankStats[rankIdx].nextChanges.push(e.nextChg);
      }
    });
    detailRows.push(row);
  }

  if (!detailRows.length) {
    cardsEl.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);font-size:12px">数据不足，至少需要2个交易日</div>`;
    return;
  }

  const validStats = rankStats.filter(s => s.total > 0);
  const maxWR = validStats.length ? Math.max(...validStats.map(s => s.wins/s.total)) : 0;
  const minWR = validStats.length ? Math.min(...validStats.map(s => s.wins/s.total)) : 0;

  cardsEl.innerHTML = '';
  rankStats.forEach((s, i) => {
    const wr     = s.total > 0 ? s.wins / s.total : null;
    const avgNext = s.nextChanges.length ? s.nextChanges.reduce((a,b)=>a+b,0)/s.nextChanges.length : null;
    const isBest  = wr !== null && wr === maxWR && s.total > 0;
    const isWorst = wr !== null && wr === minWR && s.total > 0 && minWR !== maxWR;
    const pctColor = wr === null ? '#8b949e' : wr >= 0.6 ? '#3fb950' : wr <= 0.4 ? '#f85149' : '#e6edf3';
    const avgColor = avgNext === null ? '#8b949e' : avgNext >= 0 ? '#3fb950' : '#f85149';
    const card = document.createElement('div');
    card.className = 'rank-card' + (isBest ? ' best' : isWorst ? ' worst' : '');
    card.innerHTML = `
      <div class="rk-num">第 ${i+1} 名</div>
      <div class="rk-pct" style="color:${pctColor}">${wr !== null ? Math.round(wr*100)+'%' : '—'}</div>
      <div class="rk-frac">${s.wins}/${s.total} 次↑</div>
      <div class="rk-avg" style="color:${avgColor}">次日均 ${avgNext !== null ? (avgNext>0?'+':'')+avgNext.toFixed(2)+'%' : '—'}</div>
    `;
    cardsEl.appendChild(card);
  });

  const maxCols = Math.max(...detailRows.map(r => r.entries.length));
  const rankHeaders = Array.from({length: maxCols}, (_,i) => `<th>第${i+1}名</th>`).join('');
  tableEl.innerHTML = `
    <thead><tr><th>日期</th>${rankHeaders}</tr></thead>
    <tbody id="rank-detail-body"></tbody>
  `;
  const tbody = tableEl.querySelector('tbody');
  detailRows.slice(-60).forEach(({ date, entries }) => {
    const tr = document.createElement('tr');
    let html = `<td style="color:var(--muted);white-space:nowrap">${fmtDate(date)}</td>`;
    entries.forEach(e => {
      const todayColor = e.todayChg >= 0 ? '#3fb950' : '#f85149';
      const nextColor  = e.nextChg === null ? '#8b949e' : e.nextChg >= 0 ? '#3fb950' : '#f85149';
      const nextStr    = e.nextChg !== null
        ? `<span style="color:${nextColor}">${e.nextChg>0?'+':''}${e.nextChg.toFixed(2)}%</span>`
        : `<span style="color:#484f58">—</span>`;
      html += `<td>
        <span style="color:${e.color};font-weight:700">${e.ticker}</span>
        <span style="color:${todayColor};margin-left:3px">${e.todayChg>0?'+':''}${e.todayChg.toFixed(2)}%</span>
        <br><span style="font-size:10px;color:var(--muted)">次日→</span> ${nextStr}
      </td>`;
    });
    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}
