<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title> V6版本</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .title h1 { font-size: 17px; font-weight: 700; }
    header .title p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .refresh-btn:active { background: #21262d; }
    .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 12px 0;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .summary-card .val { font-size: 22px; font-weight: 700; }
    .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .up  { color: var(--green); }
    .dn  { color: var(--red); }
    .neu { color: var(--accent); }

    /* Stock grid */
    .stocks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
    }

    @media (min-width: 520px)  { .stocks-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px)  { .stocks-grid { grid-template-columns: repeat(4, 1fr); } }

    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      overflow: hidden;
    }

    .stock-card:active { transform: scale(0.96); }
    .stock-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .stock-card.up-card  { border-left: 3px solid var(--green); }
    .stock-card.dn-card  { border-left: 3px solid var(--red); }

    .stock-card .ticker { font-size: 14px; font-weight: 700; }
    .stock-card .sname  { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stock-card .price  { font-size: 15px; font-weight: 600; margin-top: 8px; }
    .stock-card .change { font-size: 12px; font-weight: 600; margin-top: 3px; }
    .mini-chart { margin-top: 8px; height: 38px; }

    /* Big chart */
    .chart-section {
      margin: 4px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .chart-section h2 {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chart-section h2 em { font-style: normal; color: var(--accent); font-size: 12px; }
    .chart-wrap { height: 220px; }

    /* Heatmap */
    .heatmap-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
      content-visibility: auto;
      contain-intrinsic-size: 1px 400px;
      contain: layout style;
    }

    .heatmap-section h2 { font-size: 13px; margin-bottom: 10px; }

    .hm-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      min-width: 360px;
    }

    .hm-table th {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
      padding: 3px;
    }

    .hm-table td.ticker-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      padding: 4px 6px;
      white-space: nowrap;
    }

    .hm-cell {
      border-radius: 6px;
      padding: 5px 3px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      min-width: 42px;
    }

    /* Error / loading */
    .error-bar {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.35);
      color: #f85149;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 10px 12px 0;
      font-size: 12px;
    }

    .loading-overlay {
      text-align: center;
      padding: 50px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot-flash { display: inline-flex; gap: 4px; margin-left: 4px; }
    .dot-flash span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
      animation: df 1.2s infinite;
    }
    .dot-flash span:nth-child(2) { animation-delay: .2s; }
    .dot-flash span:nth-child(3) { animation-delay: .4s; }
    @keyframes df { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    .skeleton {
      background: linear-gradient(90deg,#21262d 25%,#2d333b 50%,#21262d 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    .last-update { text-align: center; font-size: 11px; color: var(--muted); padding: 14px 0 0; }

    .data-src { text-align: center; font-size: 10px; color: #484f58; padding: 4px 0 16px; }

    /* ── Model PK section ── */
    .pk-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      content-visibility: auto;
      contain-intrinsic-size: 1px 500px;
      contain: layout style;
    }
    .pk-section h2 { font-size: 13px; margin-bottom: 4px; }
    .pk-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }

    .pk-scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pk-card {
      border-radius: 10px;
      border: 2px solid var(--border);
      padding: 14px;
      text-align: center;
      position: relative;
    }
    .pk-card.winner { border-color: #e3b341; box-shadow: 0 0 0 1px #e3b341; }
    .pk-card .pk-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .pk-card .pk-rate { font-size: 32px; font-weight: 900; }
    .pk-card .pk-detail { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .pk-card .pk-crown { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 18px; }

    .pk-history {
      overflow-x: auto;
    }
    .pk-history-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .pk-history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 500px;
    }
    .pk-history-table th {
      color: var(--muted); font-weight: 500;
      padding: 4px 8px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .pk-history-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }
    .pk-history-table tr:last-child td { border-bottom: none; }
    .pk-badge {
      display: inline-block; padding: 2px 7px; border-radius: 5px;
      font-weight: 700; font-size: 10px;
    }
    .pk-badge.hit-rule  { background: rgba(63,185,80,0.15);  color: #3fb950; border: 1px solid #3fb95055; }
    .pk-badge.miss-rule { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f8514955; }
    .pk-badge.hit-lr    { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #58a6ff55; }
    .pk-badge.miss-lr   { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f8514955; }
    .pk-badge.neut      { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    /* ── Rank winrate section ── */
    .rank-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      content-visibility: auto;
      contain-intrinsic-size: 1px 500px;
      contain: layout style;
    }

    .rank-section h2 { font-size: 13px; margin-bottom: 4px; }
    .rank-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }

    .rank-cards {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) { .rank-cards { grid-template-columns: repeat(4, 1fr); } }

    .rank-card {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
    }

    .rank-card .rk-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .rank-card .rk-pct { font-size: 18px; font-weight: 800; }
    .rank-card .rk-frac { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .rank-card .rk-avg  { font-size: 10px; margin-top: 3px; }
    .rank-card.best { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    .rank-card.worst { border-color: var(--red); }

    .rank-detail-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

    .rank-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .rank-detail-table th {
      color: var(--muted);
      font-weight: 500;
      padding: 4px 6px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .rank-detail-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }

    .rank-detail-table tr:last-child td { border-bottom: none; }

    .rank-badge {
      display: inline-block;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #21262d;
      text-align: center;
      line-height: 20px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── Today signal ── */
    .signal-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .signal-section h2 { font-size: 13px; margin-bottom: 10px; color: var(--muted); font-weight: 500; }

    /* Date picker row */
    .sig-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .sig-date-row label { font-size: 11px; color: var(--muted); }

    /* 信号模式切换按钮 */
    .sig-mode-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }
    .sig-mode-row span { font-size: 11px; color: var(--muted); margin-right: 2px; }
    .sig-mode-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .sig-mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 700;
    }
    .sig-mode-btn.open-mode.active {
      background: #e3b341;
      border-color: #e3b341;
      color: #0d1117;
    }

    /* 开盘信号列 */
    .open-signal-col {
      color: #e3b341;
      font-size: 11px;
      text-align: center;
      font-weight: 700;
    }

    .sig-date-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      flex: 1;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }

    .sig-date-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .sig-date-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sig-date-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }
    .sig-date-btn.latest { border-color: #e3b341; color: #e3b341; }
    .sig-date-btn.latest.active { background: #e3b341; color: #0d1117; }

    /* Actual result banner */
    .actual-result {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 9px;
      background: #0d1117;
      border: 1px solid var(--border);
      font-size: 11px;
      align-items: center;
    }

    .actual-result .ar-label { color: var(--muted); margin-right: 4px; }
    .actual-result .ar-item  { display: flex; align-items: center; gap: 4px; }
    .actual-result .ar-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 10px; font-weight: 700; font-size: 11px;
    }
    .ar-badge.hit  { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
    .ar-badge.miss { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f85149; }

    /* Overall verdict */
    .verdict-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: stretch;
    }

    .verdict-main {
      flex: 1;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 2px solid transparent;
    }

    .verdict-main.long  { background: rgba(63,185,80,0.1);  border-color: #3fb950; }
    .verdict-main.short { background: rgba(248,81,73,0.1);  border-color: #f85149; }
    .verdict-main.neut  { background: rgba(139,148,158,0.08); border-color: #30363d; }

    .verdict-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .verdict-word {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .verdict-main.long  .verdict-word { color: #3fb950; }
    .verdict-main.short .verdict-word { color: #f85149; }
    .verdict-main.neut  .verdict-word { color: #8b949e; }

    .verdict-conf {
      font-size: 12px;
      margin-top: 6px;
      color: var(--muted);
    }

    .verdict-conf strong { color: var(--text); }

    /* Per-stock mini signals */
    .verdict-stocks {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 140px;
    }

    .vs-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1117;
      border-radius: 7px;
      padding: 5px 9px;
      gap: 8px;
      font-size: 11px;
    }

    .vs-ticker { font-weight: 700; width: 36px; }
    .vs-chg    { width: 48px; text-align: right; font-size: 10px; }
    .vs-dir    { font-weight: 700; font-size: 11px; width: 28px; text-align: right; }

    /* Hit rules list */
    .sig-rules-title {
      font-size: 11px;
      color: var(--muted);
      margin: 4px 0 8px;
    }

    .sig-rule-item {
      display: grid;
      grid-template-columns: 36px 1fr auto auto auto;
      align-items: center;
      padding: 7px 10px;
      border-radius: 7px;
      background: #0d1117;
      border: 1px solid var(--border);
      margin-bottom: 5px;
      font-size: 11px;
      gap: 8px;
    }

    .sig-rule-item .sri-desc { color: var(--text); }
    .sig-rule-item .sri-ticker { font-weight: 700; }
    .sig-rule-item .sri-wr { font-weight: 700; white-space: nowrap; }
    .sig-rule-item .sri-dir { white-space: nowrap; font-size: 10px; }

    /* ── Rule miner ── */
    .miner-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      content-visibility: auto;
      contain-intrinsic-size: 1px 300px;
    }

    .miner-section h2 { font-size: 13px; margin-bottom: 4px; }
    .miner-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }

    .miner-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .miner-controls label { font-size: 11px; color: var(--muted); }

    .miner-controls select {
      background: #0d1117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
    }

    .rule-list { display: flex; flex-direction: column; gap: 6px; }

    .rule-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
    }

    .rule-row.top1 { border-color: #3fb950; background: rgba(63,185,80,0.05); }
    .rule-row.top2 { border-color: rgba(63,185,80,0.5); }

    .rule-desc { color: var(--text); line-height: 1.5; }
    .rule-desc strong { color: var(--accent); }

    .rule-wr {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .rule-avg { font-size: 11px; white-space: nowrap; text-align: right; }
    .rule-n   { font-size: 10px; color: var(--muted); white-space: nowrap; }

    .no-rules { color: var(--muted); font-size: 12px; padding: 12px 0; text-align: center; }

    /* ── Miss analysis ── */
    .miss-section {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .miss-title {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .miss-card {
      background: #0d1117;
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 9px;
      padding: 10px 12px;
      margin-bottom: 7px;
      font-size: 11px;
    }

    .miss-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .miss-card-header .mc-ticker { font-weight: 700; font-size: 13px; }
    .miss-card-header .mc-pred   { padding: 2px 8px; border-radius: 5px; font-weight: 700; font-size: 11px; }
    .miss-card-header .mc-actual { font-size: 11px; font-weight: 600; }
    .miss-card-header .mc-badge  {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.4);
    }

    .miss-reason {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .miss-reason-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      background: #161b22;
      line-height: 1.5;
    }

    .miss-reason-row .mr-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .miss-reason-row .mr-text { color: var(--text); flex: 1; }
    .miss-reason-row .mr-text em { font-style: normal; color: #e3b341; font-weight: 600; }
    .miss-reason-row .mr-text s  { color: var(--muted); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 0;
      flex-wrap: wrap;
    }

    .filter-bar span { font-size: 12px; color: var(--muted); }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  <div class="title">
    <h1>V6版本</h1>
    <p id="date-range">近一周</p>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
    <span class="spin">↻</span> 刷新
  </button>
</header>

<div id="error-zone"></div>

<div class="filter-bar" id="filter-bar">
  <span>时间范围：</span>
  <button class="filter-btn" data-days="5"   onclick="setFilter(5)">近1周</button>
  <button class="filter-btn" data-days="10"  onclick="setFilter(10)">近2周</button>
  <button class="filter-btn" data-days="21"  onclick="setFilter(21)">近1个月</button>
  <button class="filter-btn" data-days="63"  onclick="setFilter(63)">近3个月</button>
  <button class="filter-btn active" data-days="0" onclick="setFilter(0)">近1年</button>
</div>

<div id="main-content">
  <div class="loading-overlay">
    加载中<span class="dot-flash"><span></span><span></span><span></span></span>
  </div>
</div>

<script>
const API_BASE = (location.protocol === 'file:') ? 'http://localhost:8081' : '';
const SYMBOLS = [
  { ticker: 'AAPL',  name: 'Apple',     color: '#58a6ff' },
  { ticker: 'MSFT',  name: 'Microsoft', color: '#79c0ff' },
  { ticker: 'NVDA',  name: 'NVIDIA',    color: '#56d364' },
  { ticker: 'GOOGL', name: 'Alphabet',  color: '#e3b341' },
  { ticker: 'AMZN',  name: 'Amazon',    color: '#f0883e' },
  { ticker: 'META',  name: 'Meta',      color: '#d2a8ff' },
  { ticker: 'TSLA',  name: 'Tesla',     color: '#ff7b72' },
  { ticker: 'QQQ',   name: '纳斯达克100', color: '#ffa657' },
];

const FINNHUB_KEY = 'd7ia59hr01qu8vfnt2f0d7ia59hr01qu8vfnt2fg';
let stockData = {};
let futuresData = {};
let futuresHistory = {}; // NQ=F ES=F 历史日线数据
let selectedTicker = 'AAPL';
// 缓存：只依赖历史数据，loadAll后计算一次
let _cachedObs = null;
let _cachedComboConds = null;
let _cachedFutureBeta = {};     // ticker → beta
let _cachedFutureOpenBeta = {}; // ticker → beta
let _cachedModelPK = null;
let _cachedRfModel      = null;
let _cachedDlModel      = null;
let _cachedOpenRuleHits = null;
let _cachedRfOpenModel  = null;
let _cachedDlOpenModel  = null;
let _cachedMissPatterns = null; // 未命中规律过滤条件
// ticker → condKey → [{date, nextChg}]  预计算每条规则的历史命中列表
let _cachedRuleHits = null;
let _cachedAllConds = null;   // 全部条件（base + combo），只算一次
let _condLabelMap   = null;   // key → label 查找表
let _qqqDateIdx = null;       // QQQ 日期 → index 的 Map（O(1) 查找）
let _stockDateIdx = {};       // ticker → Map<date, idx>
let _pkDayIdx = null;         // modelPK date → {ticker → stock entry} Map
let _dateSignalCache = null;  // date → ticker → {hitRules, longScore}（pollHeavy后预计算，点击O(1)取用）
let lineChart = null;
let filterDays = 0; // 0 = all available (1y)
let sigMode = 'close'; // 'close' = 收盘信号, 'open' = 开盘信号
let _cachedOpenBeta = {}; // ticker → {beta, pts, xPts} 开盘跳空→开盘到收盘 beta
let _dateOpenSignalCache = null; // 开盘信号预计算缓存

function setSigMode(mode) {
  sigMode = mode;
  document.getElementById('mode-close').classList.toggle('active', mode === 'close');
  document.getElementById('mode-open').classList.toggle('active', mode === 'open');
  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const allDates = [...allDatesSet].sort();
  const targetDate = signalDate || allDates[allDates.length - 1];
  const vr = document.getElementById('verdict-row');
  if (vr) vr.innerHTML = '';
  if (mode === 'open') {
    const ssb = document.getElementById('signal-stats-bar');
    if (ssb) { ssb.style.display = 'none'; ssb.innerHTML = ''; }
    renderOpenStatsBar(allDates);
    renderOpenSignalForDate(targetDate, allDates);
  } else {
    const sb = document.getElementById('open-stats-bar');
    if (sb) { sb.style.display = 'none'; sb.innerHTML = ''; }
    renderSignalStatsBar();
    renderSignalForDate(targetDate, allDates);
  }
}

function setFilter(days) {
  filterDays = days;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.days === days);
  });
  const dates = getFilteredDates();
  updateDateRange(dates);
  renderAll(dates);
  renderSignalStatsBar();
  if (sigMode === 'open') {
    const allDatesSet = new Set();
    SYMBOLS.forEach(({ ticker }) => {
      const d = stockData[ticker];
      if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
    });
    renderOpenStatsBar([...allDatesSet].sort());
  }
}

function getFilteredDates() {
  const sample = Object.values(stockData).find(v => v);
  if (!sample) return [];
  const allDates = sample.dates.filter((_, i) => sample.changes[i] !== null);
  return filterDays > 0 ? allDates.slice(-filterDays) : allDates;
}

function updateDateRange(dates) {
  if (!dates.length) return;
  document.getElementById('date-range').textContent =
    `${fmtDateShort(dates[0])} ~ ${fmtDateShort(dates[dates.length - 1])}`;
}

// ── Date helpers ────────────────────────────────────────────────
function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(ymd) {
  const [,m,d] = ymd.split('-');
  return `${+m}/${+d}`;
}

function fmtDateShort(ymd) {
  const days = ['日','一','二','三','四','五','六'];
  const dt = new Date(ymd + 'T12:00:00');
  return `${+ymd.slice(5,7)}/${+ymd.slice(8,10)} 周${days[dt.getDay()]}`;
}

// ── Load all ────────────────────────────────────────────────────
async function loadAll() {
  if (realtimeTimer) { clearInterval(realtimeTimer); realtimeTimer = null; }
  clearError();
  setLoading(true);
  document.getElementById('main-content').innerHTML =
    `<div class="loading-overlay">加载中<span class="dot-flash"><span></span><span></span><span></span></span></div>`;

  try {
    const res  = await fetch(API_BASE + '/api/data');
    if (!res.ok) throw new Error(`服务器错误 ${res.status}`);
    const data = await res.json();

    stockData      = data.stockData;
    futuresData    = data.futuresData;
    futuresHistory = data.futuresHistory;
    _cachedModelPK = data.modelPK;

    // 还原压缩格式的 ruleHits：[[dateIdx, nextChg×100]] → [{date, nextChg}]
    const allDates = data.allDates || [];
    const raw = data.ruleHits || {};
    _cachedRuleHits = {};
    for (const ticker of Object.keys(raw)) {
      _cachedRuleHits[ticker] = {};
      for (const [key, hits] of Object.entries(raw[ticker])) {
        _cachedRuleHits[ticker][key] = hits.map(([di, nc]) => ({ date: allDates[di], nextChg: nc / 100 }));
      }
    }
    // 前端缓存 beta 置空，用到时再算
    _cachedFutureBeta     = {};
    _cachedFutureOpenBeta = {};
    _futDateIdx           = {};
    _cachedComboConds     = null;
    // 预热条件列表和 label 查找表（只算一次，点日期时直接用）
    _cachedAllConds = [...CONDITIONS, ...buildComboConds()];
    _condLabelMap   = new Map(_cachedAllConds.map(c => [c.key, c.label]));
    // 预建日期→index Map，避免 indexOf O(n) 查找
    _qqqDateIdx = null;
    _stockDateIdx = {};
    const qqq = stockData['QQQ'];
    if (qqq) _qqqDateIdx = new Map(qqq.dates.map((d, i) => [d, i]));
    for (const { ticker } of [...SYMBOLS, { ticker: 'QQQ' }]) {
      const d = stockData[ticker];
      if (d) _stockDateIdx[ticker] = new Map(d.dates.map((dt, i) => [dt, i]));
    }
    // 预热所有 ticker 的 QQQ-open beta（点日期时无需再算）
    for (const { ticker } of SYMBOLS) calcQqqOpenBeta(ticker);
    // 预建 modelPK 日期索引
    _pkDayIdx = null;
    if (_cachedModelPK?.days) {
      _pkDayIdx = new Map();
      for (const day of _cachedModelPK.days) {
        const tickerMap = new Map(day.stocks.map(s => [s.ticker, s]));
        _pkDayIdx.set(day.date, tickerMap);
      }
    }
  } catch (e) {
    showError(`数据加载失败：${e.message}，请确认后端服务已启动（uvicorn server:app --port 8000）`);
    setLoading(false);
    return;
  }

  const dates = getFilteredDates();
  updateDateRange(dates);
  renderAll(dates);
  setLoading(false);

  // 后台轮询重计算结果（规则命中 + 模型PK），不阻塞首屏
  pollHeavy();
}

async function pollHeavy() {
  const MAX_WAIT = 120000; // 最多等2分钟
  const start = Date.now();
  while (Date.now() - start < MAX_WAIT) {
    await new Promise(r => setTimeout(r, 1500));
    try {
      const res = await fetch(API_BASE + '/api/heavy');
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.ready) continue;

      // 更新缓存，并预计算前缀和（wins/sumChg 累计），避免点击时 O(n) 遍历
      const allDates = (stockData['QQQ']?.dates) || [];
      const raw = data.ruleHits || {};
      _cachedRuleHits = {};
      for (const ticker of Object.keys(raw)) {
        _cachedRuleHits[ticker] = {};
        for (const [key, hits] of Object.entries(raw[ticker])) {
          const arr = Array.isArray(hits[0])
            ? hits.map(([di, nc]) => ({ date: allDates[di], nextChg: nc / 100 }))
            : hits;
          // 附加前缀和数组：pfWins[i] = arr[0..i-1] 中 nextChg>0 的个数
          const pfWins = new Int32Array(arr.length + 1);
          const pfSum  = new Float64Array(arr.length + 1);
          for (let i = 0; i < arr.length; i++) {
            pfWins[i + 1] = pfWins[i] + (arr[i].nextChg > 0 ? 1 : 0);
            pfSum[i + 1]  = pfSum[i]  + arr[i].nextChg;
          }
          arr._pfWins = pfWins;
          arr._pfSum  = pfSum;
          _cachedRuleHits[ticker][key] = arr;
        }
      }
      _cachedModelPK      = data.modelPK;
      _cachedRfModel      = data.rfModel      || null;
      _cachedDlModel      = data.dlModel      || null;
      _cachedOpenRuleHits = data.openRuleHits  || null;
      _cachedRfOpenModel  = data.rfOpenModel   || null;
      _cachedDlOpenModel  = data.dlOpenModel   || null;
      _cachedMissPatterns = data.missPatterns  || null;
      _pkDayIdx = null;
      if (_cachedModelPK?.days) {
        _pkDayIdx = new Map();
        for (const day of _cachedModelPK.days) {
          _pkDayIdx.set(day.date, new Map(day.stocks.map(s => [s.ticker, s])));
        }
      }

      // ── 预计算每个历史日期的信号（最核心的优化）──
      // 把 cond.fn(stock) 的调用从"每次点击"移到"数据加载完成后一次性算好"
      // 先让浏览器渲染一帧，再跑预计算（避免阻塞pollHeavy完成后的首屏刷新）
      await new Promise(r => setTimeout(r, 0));
      _dateSignalCache = buildDateSignalCache();

      // 只刷新信号区域（规则命中 + 模型PK + 信号挖掘），不重建整个页面
      renderTodaySignal();
      renderMiner();
      renderModelPK();
      renderRankWinrate();
      // 刷新统计条
      if (sigMode === 'open') {
        const allDatesSet2 = new Set();
        SYMBOLS.forEach(({ ticker }) => {
          const d = stockData[ticker];
          if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet2.add(dt); });
        });
        renderOpenStatsBar([...allDatesSet2].sort());
      } else {
        renderSignalStatsBar();
      }
      break;
    } catch (_) { /* ignore, retry */ }
  }
}

// ── 预计算每个日期的信号缓存 ──────────────────────────────────────
// 遍历所有历史日期，对每个日期/每个股票执行 cond.fn + 二分查找 + 胜率计算
// 结果存 Map<date, Map<ticker, {hitRules, longScore}>>
// 点击日期时直接取，完全消除主线程计算
function buildDateSignalCache() {
  const ruleHits = _cachedRuleHits;
  if (!ruleHits) return null;

  const allConds  = _cachedAllConds || [...CONDITIONS, ...buildComboConds()];
  const condByKey = new Map(allConds.map(c => [c.key, c]));

  // 收集所有有数据的日期
  const allDatesSet = new Set();
  for (const { ticker } of SYMBOLS) {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  }
  const allDates = [...allDatesSet].sort();

  const cache = new Map();

  for (const targetDate of allDates) {
    // 构建当日各股快照（rank/marketUpCount）
    // QQQ 近期涨跌
    const qqq = stockData['QQQ'];
    let qqqRet1 = null, qqqRet3 = null, qqqRet5 = null;
    if (qqq) {
      const qi = _qqqDateIdx ? (_qqqDateIdx.get(targetDate) ?? -1) : qqq.dates.indexOf(targetDate);
      if (qi >= 0) {
        const qc = qqq.changes;
        if (qc[qi] != null) qqqRet1 = qc[qi];
        if (qi >= 2 && [0,1,2].every(j => qc[qi-j] != null)) qqqRet3 = qc[qi]+qc[qi-1]+qc[qi-2];
        if (qi >= 4 && [0,1,2,3,4].every(j => qc[qi-j] != null)) qqqRet5 = qc[qi]+qc[qi-1]+qc[qi-2]+qc[qi-3]+qc[qi-4];
      }
    }

    const row = [];
    for (const { ticker, color, name } of SYMBOLS) {
      const d = stockData[ticker];
      if (!d) continue;
      const idx = _stockDateIdx[ticker];
      const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
      if (ti < 0 || d.changes[ti] == null) continue;
      // MA 位置
      const cl = d.closes || [];
      let aboveMa5 = null, aboveMa10 = null, aboveMa20 = null;
      if (ti >= 19 && cl[ti]) {
        const ma = (n) => { const s = cl.slice(ti-n+1, ti+1).filter(v=>v); return s.length===n ? s.reduce((a,b)=>a+b)/n : null; };
        const m5 = ma(5), m10 = ma(10), m20 = ma(20);
        if (m5  != null) aboveMa5  = cl[ti] > m5;
        if (m10 != null) aboveMa10 = cl[ti] > m10;
        if (m20 != null) aboveMa20 = cl[ti] > m20;
      }
      // 超额收益
      const sc = d.changes;
      let excess1 = null, excess3 = null, excess5 = null;
      if (sc[ti] != null && qqqRet1 != null) excess1 = +(sc[ti] - qqqRet1).toFixed(2);
      if (ti >= 2 && qqqRet3 != null && [0,1,2].every(j => sc[ti-j] != null))
        excess3 = +((sc[ti]+sc[ti-1]+sc[ti-2]) - qqqRet3).toFixed(2);
      if (ti >= 4 && qqqRet5 != null && [0,1,2,3,4].every(j => sc[ti-j] != null))
        excess5 = +((sc[ti]+sc[ti-1]+sc[ti-2]+sc[ti-3]+sc[ti-4]) - qqqRet5).toFixed(2);
      // ATR5
      const dr = d.dayRanges || [];
      const drVals = [0,1,2,3,4].map(j => dr[ti-j]).filter(v => v != null);
      const atr5 = drVals.length ? +(drVals.reduce((a,b)=>a+b)/drVals.length).toFixed(2) : null;
      // 周涨幅（滚动5日）
      let week5 = null, excessWeek5 = null;
      if (ti >= 4 && [0,1,2,3,4].every(j => sc[ti-j] != null))
        week5 = +([0,1,2,3,4].reduce((s,j)=>s+sc[ti-j],0)).toFixed(2);
      if (week5 != null && qqqRet5 != null) excessWeek5 = +(week5 - qqqRet5).toFixed(2);

      row.push({ ticker, color, name,
        todayChg: sc[ti],
        prevChg:  ti > 0 ? sc[ti-1] : null,
        qqqNextOpen: null,
        aboveMa5, aboveMa10, aboveMa20,
        excess1, excess3, excess5, atr5,
        week5, qqqWeek5: qqqRet5, excessWeek5 });
    }
    if (!row.length) continue;

    const sorted = [...row].sort((a, b) => b.todayChg - a.todayChg);
    sorted.forEach((e, i) => { e.rank = i + 1; e.total = sorted.length; });
    const marketUpCount = row.filter(e => e.todayChg > 0).length;
    const qqqNextOpen = getQqqNextOpen(targetDate);
    row.forEach(e => { e.marketUpCount = marketUpCount; e.qqqNextOpen = qqqNextOpen; e.qqqRet1 = qqqRet1; e.qqqRet3 = qqqRet3; e.qqqRet5 = qqqRet5; });

    const tickerMap = new Map();
    for (const stock of row) {
      const tickerHits = ruleHits[stock.ticker] || {};
      const hitRules = [];
      for (const key of Object.keys(tickerHits)) {
        const cond = condByKey.get(key);
        if (!cond || !cond.fn(stock)) continue;
        const all = tickerHits[key];
        // 二分查找
        let lo = 0, hi = all.length;
        while (lo < hi) { const mid = (lo + hi) >>> 1; all[mid].date < targetDate ? lo = mid + 1 : hi = mid; }
        const n = lo;
        if (n < 3) continue;
        const wins = all._pfWins ? all._pfWins[n] : (() => { let w=0; for(let i=0;i<n;i++) if(all[i].nextChg>0) w++; return w; })();
        const avg  = all._pfSum  ? all._pfSum[n] / n : (() => { let s=0; for(let i=0;i<n;i++) s+=all[i].nextChg; return s/n; })();
        hitRules.push({ label: cond.label, wr: wins/n, avg, n, wins });
      }
      let wSum = 0, wTot = 0;
      hitRules.forEach(r => { wSum += (r.wr - 0.5) * r.n; wTot += r.n; });
      const longScore = wTot > 0 ? wSum / wTot : 0;
      tickerMap.set(stock.ticker, { hitRules, longScore });
    }
    cache.set(targetDate, tickerMap);
  }
  return cache;
}

// ── Render ───────────────────────────────────────────────────────
function renderAll(weekDates) {
  const content = document.getElementById('main-content');
  if (!weekDates.length) {
    content.innerHTML = `<div class="loading-overlay">暂无数据，请点击刷新重试</div>`;
    return;
  }

  let upCount = 0, dnCount = 0;
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (!d || d.lastChange == null) return;
    if (d.lastChange > 0) upCount++;
    else if (d.lastChange < 0) dnCount++;
  });
  const neuCount = SYMBOLS.length - upCount - dnCount;

  content.innerHTML = `
    <div class="signal-section">
      <h2>基于历史规则 · 操作信号回溯</h2>
      <div class="sig-mode-row">
        <span>信号类型：</span>
        <button class="sig-mode-btn ${sigMode==='close'?'active':''}" id="mode-close" onclick="setSigMode('close')">📊 收盘信号</button>
        <button class="sig-mode-btn open-mode ${sigMode==='open'?'active':''}" id="mode-open"  onclick="setSigMode('open')">🌅 开盘信号</button>
      </div>
      <div class="sig-date-row">
        <label>选择日期：</label>
        <div class="sig-date-scroll" id="sig-date-scroll"></div>
      </div>
      <div id="signal-stats-bar" style="display:none;margin:6px 0 10px"></div>
      <div id="actual-result"></div>
      <div id="open-stats-bar" style="display:none;margin:6px 0 10px"></div>
      <div class="verdict-row" id="verdict-row"></div>
      <div class="sig-rules-title" id="sig-rules-title"></div>
      <div id="sig-rules-list"></div>
      <div id="miss-analysis"></div>
    </div>
    <div class="summary-row">
      <div class="summary-card"><div class="val up">↑ ${upCount}</div><div class="lbl">今日上涨</div></div>
      <div class="summary-card"><div class="val dn">↓ ${dnCount}</div><div class="lbl">今日下跌</div></div>
      <div class="summary-card"><div class="val neu">— ${neuCount}</div><div class="lbl">持平</div></div>
    </div>
    <div class="stocks-grid" id="stocks-grid"></div>
    <div class="chart-section">
      <h2>涨跌幅走势对比 <em id="chart-lbl">${selectedTicker} 已选中</em></h2>
      <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
    </div>
    <div class="heatmap-section">
      <h2>📊 每日涨跌热力图</h2>
      <table class="hm-table" id="heatmap"></table>
    </div>
    <div class="miner-section">
      <h2>🔍 最优信号挖掘</h2>
      <p class="subtitle">穷举条件组合，从历史数据反推胜率最高的规则 · 最少需要3次触发才纳入统计</p>
      <div class="miner-controls">
        <label>方向：</label>
        <select id="miner-dir" onchange="renderMiner()">
          <option value="long">做多</option>
          <option value="short">做空</option>
        </select>
        <label style="margin-left:8px">目标：</label>
        <select id="miner-target" onchange="renderMiner()">
          <option value="winrate">次日胜率最高</option>
          <option value="avgret">次日平均收益最高</option>
          <option value="combined">胜率×收益综合最优</option>
        </select>
        <label style="margin-left:8px">显示：</label>
        <select id="miner-topn" onchange="renderMiner()">
          <option value="5">Top 5</option>
          <option value="10">Top 10</option>
          <option value="20">Top 20</option>
        </select>
      </div>
      <div class="rule-list" id="rule-list"></div>
    </div>
    <div class="pk-section">
      <h2>⚔️ 模型 PK · 回测对比</h2>

// ── Stock cards ──────────────────────────────────────────────────
function renderCards(weekDates) {
  const grid = document.getElementById('stocks-grid');
  if (!grid) return;
  grid.innerHTML = '';

  SYMBOLS.forEach(({ ticker, name }) => {
    const d = stockData[ticker];
    const card = document.createElement('div');
    card.className = 'stock-card' + (ticker === selectedTicker ? ' selected' : '');

    if (!d) {
      card.innerHTML = `<div class="ticker">${ticker}</div><div class="sname">${name}</div>
        <div class="skeleton" style="height:14px;margin-top:8px"></div>
        <div class="skeleton" style="height:10px;margin-top:5px;width:55%"></div>`;
      grid.appendChild(card);
      return;
    }

    const isUp = (d.lastChange ?? 0) >= 0;
    card.classList.add(isUp ? 'up-card' : 'dn-card');

    const sparkId = `spark-${ticker}`;
    const chgStr = d.lastChange != null
      ? `${isUp ? '▲' : '▼'} ${Math.abs(d.lastChange).toFixed(2)}%`
      : '—';

    card.innerHTML = `
      <div class="ticker">${ticker}</div>
      <div class="sname">${name}</div>
      <div class="price ${isUp ? 'up' : 'dn'}">$${(d.lastClose ?? 0).toFixed(2)}</div>
      <div class="change ${isUp ? 'up' : 'dn'}">${chgStr}</div>
      <div class="mini-chart"><canvas id="${sparkId}"></canvas></div>`;

    card.addEventListener('click', () => {
      selectedTicker = ticker;
      renderCards(weekDates);
      renderLineChart(weekDates);
      const lbl = document.getElementById('chart-lbl');
      if (lbl) lbl.textContent = `${ticker} 已选中`;
    });

    grid.appendChild(card);
    requestAnimationFrame(() => drawSparkline(sparkId, d, weekDates));
  });
}

function getWeekChanges(d, weekDates) {
  return weekDates.map(date => {
    const idx = d.dates.indexOf(date);
    if (idx < 0 || d.changes[idx] == null) return 0;
    return d.changes[idx];
  });
}

function drawSparkline(id, d, weekDates) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const vals = getWeekChanges(d, weekDates);
  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: weekDates.map(fmtDate),
      datasets: [{
        data: vals,
        backgroundColor: vals.map(v => v >= 0 ? '#3fb950' : '#f85149'),
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } }
    }
  });
}

// ── Line chart ───────────────────────────────────────────────────
function renderLineChart(weekDates) {
  const canvas = document.getElementById('line-chart');
  if (!canvas) return;
  if (lineChart) { lineChart.destroy(); lineChart = null; }

  const datasets = SYMBOLS.map(({ ticker, color }) => {
    const d = stockData[ticker];
    const changes = d ? getWeekChanges(d, weekDates) : weekDates.map(() => null);
    const isSel = ticker === selectedTicker;
    return {
      label: ticker,
      data: changes,
      borderColor: color,
      backgroundColor: color + '18',
      borderWidth: isSel ? 2.5 : 1.2,
      borderDash: isSel ? [] : [5, 4],
      pointRadius: isSel ? 4 : 2,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.35,
      spanGaps: true,
    };
  });

  lineChart = new Chart(canvas, {
    type: 'line',
    data: { labels: weekDates.map(fmtDate), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true, position: 'top',
          labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 18, padding: 8 }
        },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#8b949e',
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return ` ${ctx.dataset.label}: —`;
              return ` ${ctx.dataset.label}: ${v > 0 ? '+' : ''}${v.toFixed(2)}%`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' } },
        y: {
          ticks: {
            color: '#8b949e', font: { size: 11 },
            callback: v => (v > 0 ? '+' : '') + v.toFixed(1) + '%'
          },
          grid: { color: '#21262d' }

function renderHeatmap(weekDates) {

    '</tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    const row = document.createElement('tr');
    row.innerHTML = `<td class="ticker-label">${ticker}</td>`;

    weekDates.forEach(date => {
      const td = document.createElement('td');
      td.className = 'hm-cell';
      const idx = d?.dates?.indexOf(date) ?? -1;
      const v = (idx >= 0 && d.changes[idx] != null) ? d.changes[idx] : null;

      if (v === null) {
        td.style.background = '#21262d';
        td.style.color = '#8b949e';
        td.textContent = '—';
      } else {
        const intensity = Math.min(Math.abs(v) / 4, 1);
        const alpha = 0.2 + intensity * 0.65;
        if (v >= 0) {
          td.style.background = `rgba(63,185,80,${alpha})`;
          td.style.color = intensity > 0.5 ? '#fff' : '#3fb950';
        } else {
          td.style.background = `rgba(248,81,73,${alpha})`;
          td.style.color = intensity > 0.5 ? '#fff' : '#f85149';
        }
        td.textContent = (v > 0 ? '+' : '') + v.toFixed(2) + '%';
      }
      row.appendChild(td);
    });

    tbody.appendChild(row);
  });
  table.appendChild(tbody);
}

  try {

    const data = await res.json();
    const quotes = data.quotes || {};

      }
    });
    ['NQ=F', 'ES=F'].forEach(f => {

  SYMBOLS.forEach(({ ticker }) => {

function renderSignalForDate(targetDate, allDates) {
  const verdictRow = document.getElementById('verdict-row');
  const rulesTitleEl = document.getElementById('sig-rules-title');
  const rulesList    = document.getElementById('sig-rules-list');
  const actualEl     = document.getElementById('actual-result');
  if (!verdictRow) return;

  const isLatest  = targetDate === allDates[allDates.length - 1];
  const dateIdx   = allDates.indexOf(targetDate);
  const nextDate  = dateIdx >= 0 && dateIdx < allDates.length - 1 ? allDates[dateIdx + 1] : null;

  // Build per-stock snapshot for targetDate（用预建 Map O(1) 查找）
  const qqqNextOpenForDate = getQqqNextOpen(targetDate);
  const qqq = stockData['QQQ'];
  let qqqRet1 = null, qqqRet3 = null, qqqRet5 = null;
  if (qqq) {
    const qi = _qqqDateIdx ? (_qqqDateIdx.get(targetDate) ?? -1) : qqq.dates.indexOf(targetDate);
    if (qi >= 0) {
      const qc = qqq.changes;
      if (qc[qi] != null) qqqRet1 = qc[qi];
      if (qi >= 2 && [0,1,2].every(j => qc[qi-j] != null)) qqqRet3 = qc[qi]+qc[qi-1]+qc[qi-2];
      if (qi >= 4 && [0,1,2,3,4].every(j => qc[qi-j] != null)) qqqRet5 = qc[qi]+qc[qi-1]+qc[qi-2]+qc[qi-3]+qc[qi-4];
    }
  }
  const todayRow = SYMBOLS.map(({ ticker, color, name }) => {
    const d = stockData[ticker];
    if (!d) return null;
    const idx = _stockDateIdx[ticker];
    const ti = idx ? (idx.get(targetDate) ?? -1) : d.dates.indexOf(targetDate);
    if (ti < 0 || d.changes[ti] == null) return null;
    const pi = ti > 0 ? ti - 1 : -1;
    // MA 位置
    const cl = d.closes || [];
    let aboveMa5 = null, aboveMa10 = null, aboveMa20 = null;
    if (ti >= 19 && cl[ti]) {
      const ma = (n) => { const s = cl.slice(ti-n+1,ti+1).filter(v=>v); return s.length===n ? s.reduce((a,b)=>a+b)/n : null; };
      const m5=ma(5),m10=ma(10),m20=ma(20);
      if (m5  != null) aboveMa5  = cl[ti] > m5;
      if (m10 != null) aboveMa10 = cl[ti] > m10;
      if (m20 != null) aboveMa20 = cl[ti] > m20;
    }
    // 超额收益
    const sc = d.changes;
    let excess1=null,excess3=null,excess5=null;
    if (sc[ti]!=null && qqqRet1!=null) excess1 = +(sc[ti]-qqqRet1).toFixed(2);
    if (ti>=2 && qqqRet3!=null && [0,1,2].every(j=>sc[ti-j]!=null))
      excess3 = +((sc[ti]+sc[ti-1]+sc[ti-2])-qqqRet3).toFixed(2);
    if (ti>=4 && qqqRet5!=null && [0,1,2,3,4].every(j=>sc[ti-j]!=null))
      excess5 = +((sc[ti]+sc[ti-1]+sc[ti-2]+sc[ti-3]+sc[ti-4])-qqqRet5).toFixed(2);
    // ATR5
    const dr = d.dayRanges || [];
    const drVals = [0,1,2,3,4].map(j=>dr[ti-j]).filter(v=>v!=null);
    const atr5 = drVals.length ? +(drVals.reduce((a,b)=>a+b)/drVals.length).toFixed(2) : null;
    // 周涨幅
    let week5 = null, excessWeek5 = null;
    if (ti >= 4 && [0,1,2,3,4].every(j=>sc[ti-j]!=null))
      week5 = +([0,1,2,3,4].reduce((s,j)=>s+sc[ti-j],0)).toFixed(2);
    if (week5 != null && qqqRet5 != null) excessWeek5 = +(week5 - qqqRet5).toFixed(2);

    return { ticker, color, name,
      todayChg: d.changes[ti],
      prevChg:  pi >= 0 ? d.changes[pi] : null,
      qqqNextOpen: qqqNextOpenForDate,
      qqqRet1, qqqRet3, qqqRet5,
      aboveMa5, aboveMa10, aboveMa20,
      excess1, excess3, excess5, atr5,
      week5, qqqWeek5: qqqRet5, excessWeek5 };
  }).filter(Boolean);

  if (!todayRow.length) {
    verdictRow.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">该日期无数据</div>';
    return;
  }

  // Rank + breadth
  const sorted = [...todayRow].sort((a, b) => b.todayChg - a.todayChg);
  sorted.forEach((e, i) => { e.rank = i + 1; e.total = sorted.length; });
  const marketUpCount = todayRow.filter(e => e.todayChg > 0).length;
  todayRow.forEach(e => { e.marketUpCount = marketUpCount; });

  const allConds = _cachedAllConds || [...CONDITIONS, ...buildComboConds()];
  const ruleHits = _cachedRuleHits || {};
  const condByKey = new Map(allConds.map(c => [c.key, c]));

  // 历史日期：直接从预计算缓存取，O(1)，无 cond.fn 调用
  // 最新日期（isLatest）：没有预计算，实时算（本就只有1个日期需要）
  const _dateSigMap = (!isLatest && _dateSignalCache) ? _dateSignalCache.get(targetDate) : null;

  const stockSignals = todayRow.map(stock => {
    let hitRules, longScore;
    if (_dateSigMap) {
      // O(1) 直接取缓存
      const cached = _dateSigMap.get(stock.ticker) || { hitRules: [], longScore: 0 };
      hitRules  = cached.hitRules;
      longScore = cached.longScore;
    } else {
      // 最新日期（或缓存未就绪）：实时计算
      const tickerHits = ruleHits[stock.ticker] || {};
      hitRules = [];
      for (const key of Object.keys(tickerHits)) {
        const cond = condByKey.get(key);
        if (!cond || !cond.fn(stock)) continue;
        const all = tickerHits[key];
        if (!all) continue;
        let lo = 0, hi = all.length;
        while (lo < hi) { const mid = (lo + hi) >>> 1; all[mid].date < targetDate ? lo = mid + 1 : hi = mid; }
        const n = lo;
        if (n < 3) continue;
        const wins = all._pfWins ? all._pfWins[n] : (() => { let w=0; for(let i=0;i<n;i++) if(all[i].nextChg>0) w++; return w; })();
        const avg  = all._pfSum  ? all._pfSum[n] / n : (() => { let s=0; for(let i=0;i<n;i++) s+=all[i].nextChg; return s/n; })();
        hitRules.push({ label: cond.label, wr: wins/n, avg, n, wins });
      }
      let wSum = 0, wTot = 0;
      hitRules.forEach(r => { wSum += (r.wr - 0.5) * r.n; wTot += r.n; });
      longScore = wTot > 0 ? wSum / wTot : 0;
    }

    // QQQ开盘列：今日用 futuresOpenPredict（NQ实时作代理），或直接用NQ涨跌；历史用次日QQQ实际开盘 × beta
    let qqqFop = null, qqqFopScore = 0, qqqFopDir = 'neut', qqqFopHasData = false;
    if (isLatest) {
      qqqFop = futuresOpenPredict(stock.ticker);
      if (qqqFop) {
        qqqFopScore = qqqFop.score; qqqFopDir = qqqFop.dir; qqqFopHasData = true;
      } else {
        // fallback：直接用NQ实时涨跌方向 × beta（即使pts不足也用）
        const fb    = calcQqqOpenBeta(stock.ticker);
        const nqNow = futuresData['NQ=F']?.intradayChg
                   ?? futuresHistory['NQ=F']?.intradayChg
                   ?? futuresData['ES=F']?.intradayChg
                   ?? futuresHistory['ES=F']?.intradayChg;
        if (nqNow != null) {
          const predicted = fb.beta !== 0 ? fb.beta * nqNow : nqNow * 0.8;
          const d2 = stockData[stock.ticker];
          const vals = d2 ? d2.changes.filter(v=>v!=null) : [];
          const std = vals.length > 1 ? Math.sqrt(vals.reduce((s,v)=>s+(v-(vals.reduce((a,b)=>a+b,0)/vals.length))**2,0)/vals.length)||1 : 1.5;
          qqqFopScore = predicted / std;
          qqqFopDir = qqqFopScore > 0.15 ? 'long' : qqqFopScore < -0.15 ? 'short' : 'neut';
          qqqFopHasData = true;
          qqqFop = { dir: qqqFopDir, score: qqqFopScore, predicted, nqNow };
        }
      }
    } else {
      const fb          = calcQqqOpenBeta(stock.ticker);
      const qqqNextOpen = getQqqNextOpen(targetDate);
      if (qqqNextOpen != null && fb.pts >= 10) {
        const std    = 1.5;
        qqqFopScore  = (fb.beta * qqqNextOpen) / std;
        qqqFopDir    = qqqFopScore > 0.15 ? 'long' : qqqFopScore < -0.15 ? 'short' : 'neut';
        qqqFopHasData = true;
        qqqFop = { dir: qqqFopDir, score: qqqFopScore, predicted: fb.beta * qqqNextOpen };
      }
    }

    // 今日收盘期货预测（仍保留用于综合评分）
    const fp = isLatest ? futuresPredict(stock.ticker) : null;

    // LR回归方向（从后端 modelPK 预建索引里取，O(1)）
    let lrDir = 'neut';
    if (_pkDayIdx) {
      const s2 = _pkDayIdx.get(targetDate)?.get(stock.ticker);
      if (s2) lrDir = s2.lrDir || 'neut';
    }
    // 随机森林方向
    let rfDir = 'neut', rfProb = null;
    if (_cachedRfModel?.preds) {
      const rfEntry = _cachedRfModel.preds[targetDate]?.[stock.ticker];
      if (rfEntry) { rfDir = rfEntry.dir; rfProb = rfEntry.prob; }
    }
    // 深度学习方向
    let dlDir = 'neut', dlProb = null;
    if (_cachedDlModel?.preds) {
      const dlEntry = _cachedDlModel.preds[targetDate]?.[stock.ticker];
      if (dlEntry) { dlDir = dlEntry.dir; dlProb = dlEntry.prob; }
    }
    // 综合评分：按回测胜率反推权重
    // QQQ开盘65.9%(34%) + 深度学习65.1%(32%) + 随机森林64.3%(30%) + 规则引擎兜底(4%)
    const hasFutSig = qqqFopHasData || (!isLatest);
    const futW  = hasFutSig && _cachedModelPK ? 0.34 : 0;
    const dlW   = _cachedDlModel  ? 0.32 : 0;
    const rfW   = _cachedRfModel  ? 0.30 : 0;
    const ruleW = Math.max(0.04, 1 - futW - dlW - rfW);  // 规则引擎兜底
    const total = futW + dlW + rfW + ruleW;

    const futSignal  = qqqFopHasData ? qqqFopScore * 0.5 : 0;
    const rfSignal   = rfProb  != null ? (rfProb  - 0.5) * 2 : 0;
    const dlSignal   = dlProb  != null ? (dlProb  - 0.5) * 2 : 0;
    const ruleSignal = longScore;

    let combinedScore = (futSignal*futW + dlSignal*dlW + rfSignal*rfW + ruleSignal*ruleW) / total;

    // 未命中规律过滤：命中高失败率特征区间则压制为中性
    const closeObs = { todayChg: stock.todayChg, atr5: stock.atr5, marketUpCount: stock.marketUpCount,
                       excess1: stock.excess1, week5: stock.week5, qqqRet5: stock.qqqRet5 };
    const filtered = checkMissFilter(closeObs, _cachedMissPatterns?.closeFilters);
    if (filtered) combinedScore = combinedScore * 0.3; // 衰减而非归零，保留方向参考

    return { ...stock, hitRules, longScore, lrDir, rfDir, rfProb, dlDir, dlProb, fp, qqqFop, qqqFopDir, qqqFopScore, qqqFopHasData, combinedScore, filtered };
  });

  const totalScore = stockSignals.reduce((s, x) => s + x.combinedScore, 0) / stockSignals.length;
  const conf = Math.min(100, Math.abs(totalScore) / 0.3 * 100);
  const confLabel = conf >= 70 ? '高置信度' : conf >= 40 ? '中置信度' : '低置信度';
  const overallDir  = totalScore >= 0 ? 'long' : 'short';
  const overallWord = overallDir === 'long' ? '做多' : '做空';

  stockSignals.sort((a, b) => b.combinedScore - a.combinedScore);
  // 首选：绝对值最大的信号（方向最明确），不一定是做多端
  const top1    = stockSignals.reduce((best, s) => Math.abs(s.combinedScore) > Math.abs(best.combinedScore) ? s : best, stockSignals[0]);
  const top1Dir = top1.combinedScore >= 0 ? 'long' : 'short';

  // ── Build actuals map ──
  const actualsMap = {};
  if (nextDate) {
    stockSignals.forEach(s => {
      const d = stockData[s.ticker];
      const ni = d ? d.dates.indexOf(nextDate) : -1;
      actualsMap[s.ticker] = ni >= 0 && d.changes[ni] != null ? d.changes[ni] : null;
    });
  }
  const hasActuals = Object.values(actualsMap).some(v => v !== null);

  // Valid predicted (non-neut) hits — use combinedScore (rules + futures)
  const validPredicted = stockSignals.filter(s => Math.abs(s.combinedScore) > 0.05);
  const hitCount = validPredicted.filter(s => {
    const nc = actualsMap[s.ticker];
    if (nc === null) return false;
    return s.combinedScore > 0 ? nc > 0 : nc < 0;
  }).length;
  const hitRate = hasActuals && validPredicted.length ? hitCount / validPredicted.length : null;

  if (actualEl) actualEl.innerHTML = '';

  // ── Verdict summary row ──
  verdictRow.innerHTML = '';
  const dateLabel = isLatest ? '明日操作建议' : `${fmtDate(targetDate)} 收盘后建议`;

  const main = document.createElement('div');
  main.className = `verdict-main ${overallDir}`;
  let hitRateHtml = '';
  if (hitRate !== null) {
    const rc = hitRate >= 0.6 ? '#3fb950' : hitRate >= 0.4 ? '#e3b341' : '#f85149';
    hitRateHtml = `<div style="margin-top:8px;padding:6px 10px;border-radius:7px;background:#0d1117;font-size:12px">
      次日命中率 <strong style="color:${rc};font-size:15px">${Math.round(hitRate*100)}%</strong>
      <span style="color:var(--muted);font-size:10px"> (${hitCount}/${validPredicted.length}只)</span>
    </div>`;
  } else if (isLatest) {
    hitRateHtml = `<div style="margin-top:8px;font-size:10px;color:var(--muted)">次日结果待定</div>`;
  }
  // 期货摘要：最新日期用实时NQ/ES数据，历史日期用次日QQQ开盘涨跌
  const nqChgNow = futuresData['NQ=F']?.intradayChg ?? futuresHistory['NQ=F']?.intradayChg;
  const esChgNow = futuresData['ES=F']?.intradayChg ?? futuresHistory['ES=F']?.intradayChg;
  const qqqNextOpenVal = isLatest ? null : getQqqNextOpen(targetDate);
  let futSummary = '';
  if (isLatest) {
    const nqColor = nqChgNow >= 0 ? '#3fb950' : '#f85149';
    const esColor = esChgNow >= 0 ? '#3fb950' : '#f85149';
    futSummary = `
    <div style="margin-top:10px;padding:10px 14px;border-radius:9px;background:#0d1117;
      border:1px solid #30363d;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <span style="color:var(--muted);font-size:11px">期货今开</span>
      ${nqChgNow != null
        ? `<span style="font-size:13px">NQ=F <strong style="color:${nqColor}">${nqChgNow>0?'+':''}${nqChgNow.toFixed(2)}%</strong></span>`
        : `<span style="color:var(--muted);font-size:12px">NQ=F —</span>`}
      ${esChgNow != null
        ? `<span style="font-size:13px">ES=F <strong style="color:${esColor}">${esChgNow>0?'+':''}${esChgNow.toFixed(2)}%</strong></span>`
        : `<span style="color:var(--muted);font-size:12px">ES=F —</span>`}
      <span style="color:var(--muted);font-size:10px">已纳入综合评分（规则60% + QQQ开盘40%）</span>
    </div>`;
  } else if (!isLatest && qqqNextOpenVal != null) {
    futSummary = `
    <div style="margin-top:8px;padding:6px 10px;border-radius:7px;background:#0d1117;font-size:11px;
      display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="color:var(--muted)">次日QQQ开盘</span>
      <span>QQQ <span style="color:${qqqNextOpenVal>=0?'#3fb950':'#f85149'};font-weight:700">${qqqNextOpenVal>0?'+':''}${qqqNextOpenVal.toFixed(2)}%</span></span>
      <span style="color:var(--muted);font-size:10px">次日QQQ开盘涨跌已纳入规则条件及综合评分</span>
    </div>`;
  }

  main.innerHTML = `
    <div class="verdict-label">${dateLabel}</div>
    <div class="verdict-word">${overallWord}</div>
    <div style="font-size:13px;font-weight:700;margin:6px 0 2px;color:${top1.color}">
      首选：${top1.ticker} · ${top1.name}
    </div>
    <div class="verdict-conf">
      置信度 <strong>${conf.toFixed(0)}%</strong> · ${confLabel} ·
      <span style="font-size:10px">${stockSignals.reduce((s,x)=>s+x.hitRules.length,0)} 条规则触发</span>
    </div>
    ${futSummary}
    ${hitRateHtml}
  `;
  verdictRow.appendChild(main);

  // ── Per-stock comparison table ──
  const tableWrap = document.createElement('div');
  tableWrap.className = 'verdict-stocks';

  // Header
  const hdr = document.createElement('div');
  const hasFut = true;
  const hasLR  = !!_pkDayIdx;
  const hasRF  = !!_cachedRfModel;
  const hasDL  = !!_cachedDlModel;
  const cols0 = `40px 60px ${hasLR?'52px ':''} ${hasFut?'72px ':''} ${hasRF?'52px ':''} ${hasDL?'52px ':''} 52px 14px ${hasActuals?'62px 56px':''}`;
  hdr.style.cssText = `font-size:10px;color:var(--muted);padding:3px 10px 5px;
    display:grid;grid-template-columns:${cols0};gap:6px;align-items:center`;
  const futColLabel = isLatest ? 'QQQ（实时期货）' : 'QQQ开盘';
  hdr.innerHTML = `<span>标的</span><span>规则引擎</span>${hasLR?`<span style="text-align:center;color:#58a6ff">LR回归</span>`:''  }${hasFut?`<span style="text-align:center">${futColLabel}</span>`:''  }${hasRF?`<span style="text-align:center;color:#f0883e">随机森林</span>`:''  }${hasDL?`<span style="text-align:center;color:#a371f7">深度学习</span>`:''}<span style="text-align:center">当日涨跌</span><span></span>
    ${hasActuals ? `<span style="text-align:center">次日实际</span><span style="text-align:center">结果</span>` : ''}`;
  const rowHtmls = stockSignals.map((s, idx) => {
    const dir      = s.combinedScore >= 0 ? 'long' : 'short';
    const dirWord  = dir === 'long' ? '▲ 做多' : '▼ 做空';
    const dirColor = dir === 'long' ? '#3fb950' : dir === 'short' ? '#f85149' : '#8b949e';
    const dirBg    = dir === 'long' ? 'rgba(63,185,80,0.12)' : dir === 'short' ? 'rgba(248,81,73,0.12)' : 'transparent';
    const todayColor = s.todayChg >= 0 ? '#3fb950' : '#f85149';
    const barPct   = Math.min(100, Math.abs(s.longScore) / 0.3 * 100).toFixed(0);

    const nextChg = actualsMap[s.ticker] ?? null;
    const hit = nextChg === null ? null : dir === 'long' ? nextChg > 0 : nextChg < 0;
    const nextColor = nextChg === null ? '#8b949e' : nextChg >= 0 ? '#3fb950' : '#f85149';
    const hitBg    = hit === null ? 'transparent' : hit ? 'rgba(63,185,80,0.15)' : 'rgba(248,81,73,0.15)';
    const hitColor = hit === null ? '#8b949e' : hit ? '#3fb950' : '#f85149';
    const hitWord  = hit === null ? '—' : hit ? '✓ 命中' : '✗ 未中';

    // QQQ开盘列：有模型数据用预测方向，没有则直接显示NQ=F实时涨跌（fallback到历史日线的intradayChg）
    const nqLive = futuresData['NQ=F']?.intradayChg
                ?? futuresHistory['NQ=F']?.intradayChg
                ?? futuresData['ES=F']?.intradayChg
                ?? futuresHistory['ES=F']?.intradayChg;
    let fpDir2, fpColor2, fpWord2, fpPred;
    if (s.qqqFopHasData) {
      fpDir2   = s.qqqFopDir;
      fpColor2 = fpDir2 === 'long' ? '#3fb950' : fpDir2 === 'short' ? '#f85149' : '#8b949e';
      fpWord2  = fpDir2 === 'long' ? '▲ 涨' : fpDir2 === 'short' ? '▼ 跌' : '— 中性';
      fpPred   = `${s.qqqFop.predicted>0?'+':''}${s.qqqFop.predicted.toFixed(2)}%`;
    } else if (isLatest && nqLive != null) {
      fpDir2   = null;
      fpColor2 = nqLive >= 0 ? '#3fb950' : '#f85149';
      fpWord2  = `${nqLive>0?'+':''}${nqLive.toFixed(2)}%`;
      fpPred   = 'NQ=F实时';
    } else {
      fpDir2 = null; fpColor2 = '#8b949e'; fpWord2 = '—'; fpPred = '';
    }

    // LR列
    const lrColor2 = s.lrDir === 'long' ? '#3fb950' : s.lrDir === 'short' ? '#f85149' : '#8b949e';
    const lrWord2  = s.lrDir === 'long' ? '▲ 涨' : s.lrDir === 'short' ? '▼ 跌' : '— 中性';

    const rfColor2 = s.rfDir === 'long' ? '#3fb950' : s.rfDir === 'short' ? '#f85149' : '#8b949e';
    const rfWord2  = s.rfDir === 'long' ? '▲ 涨' : s.rfDir === 'short' ? '▼ 跌' : '— 中性';
    const rfProbStr = s.rfProb != null ? `<br><span style="font-size:9px;font-weight:400;color:#8b949e">${(s.rfProb*100).toFixed(0)}%</span>` : '';
    const dlColor2 = s.dlDir === 'long' ? '#3fb950' : s.dlDir === 'short' ? '#f85149' : '#8b949e';
    const dlWord2  = s.dlDir === 'long' ? '▲ 涨' : s.dlDir === 'short' ? '▼ 跌' : '— 中性';
    const dlProbStr = s.dlProb != null ? `<br><span style="font-size:9px;font-weight:400;color:#8b949e">${(s.dlProb*100).toFixed(0)}%</span>` : '';

    const cols = `40px 60px ${hasLR?'52px ':''} ${hasFut?'72px ':''} ${hasRF?'52px ':''} ${hasDL?'52px ':''} 52px 14px ${hasActuals ? '62px 56px' : ''}`;
    return `<div class="vs-row" style="display:grid;grid-template-columns:${cols};gap:6px;align-items:center;${idx===0?`border-color:${dirColor};`:''}">
      <span style="color:${s.color};font-weight:700;font-size:11px">${idx===0?'⭐':''} ${s.ticker}</span>
      <span style="background:${dirBg};color:${dirColor};font-weight:700;font-size:11px;padding:3px 6px;border-radius:6px;text-align:center;border:1px solid ${dirColor+'55'}${s.filtered?';opacity:0.55':''}">
        ${dirWord}${s.filtered?'<br><span style="font-size:8px;color:#e3b341;font-weight:400">⚠过滤</span>':''}
        <div style="height:2px;background:#21262d;border-radius:1px;margin-top:3px;overflow:hidden"><div style="height:100%;width:${barPct}%;background:${dirColor};border-radius:1px"></div></div>
      </span>
      ${hasLR ? `<span style="color:${lrColor2};font-size:11px;text-align:center;font-weight:700">${lrWord2}</span>` : ''}
      ${hasFut ? `<span style="color:${fpColor2};font-size:11px;text-align:center;font-weight:700;line-height:1.3">${fpWord2}${fpPred?`<br><span style="font-size:9px;font-weight:400;color:#8b949e;white-space:nowrap">${fpPred}</span>`:''}</span>` : ''}
      ${hasRF  ? `<span style="color:${rfColor2};font-size:11px;text-align:center;font-weight:700;line-height:1.3">${rfWord2}${rfProbStr}</span>` : ''}
      ${hasDL  ? `<span style="color:${dlColor2};font-size:11px;text-align:center;font-weight:700;line-height:1.3">${dlWord2}${dlProbStr}</span>` : ''}
      <span style="color:${todayColor};font-size:11px;text-align:center">${s.todayChg>0?'+':''}${s.todayChg.toFixed(2)}%</span>
      <span style="color:#8b949e;font-size:12px;text-align:center">→</span>
      ${hasActuals ? `<span style="color:${nextColor};font-size:11px;font-weight:600;text-align:center">${nextChg!==null?(nextChg>0?'+':'')+nextChg.toFixed(2)+'%':'—'}</span><span style="background:${hitBg};color:${hitColor};font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;text-align:center;border:1px solid ${hit===null?'transparent':hitColor+'55'}">${hitWord}</span>` : ''}
    </div>`;
  });
  tableWrap.innerHTML = hdr.outerHTML + rowHtmls.join('');
  verdictRow.appendChild(tableWrap);

  // ── Rules ──
  const top1Rules = [...top1.hitRules].sort((a, b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5));
  const otherHits = [];
  stockSignals.slice(1).forEach(s => s.hitRules.forEach(r => otherHits.push({...r, ticker:s.ticker, color:s.color})));
  otherHits.sort((a, b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5));
  const totalRuleCount = stockSignals.reduce((s, x) => s + x.hitRules.length, 0);

  if (rulesTitleEl) rulesTitleEl.innerHTML = top1Rules.length
    ? `<strong style="color:${top1.color}">${top1.ticker}</strong> ${top1Dir==='long'?'做多':'做空'}的依据（${top1Rules.length} 条规则 · 全部共 ${totalRuleCount} 条）`
    : '无有效规则触发（历史数据不足3次）';

  if (rulesList) {
    const ruleHtml = (r, sc, st, hl) => {
      const wrColor  = r.wr>=0.65?'#3fb950':r.wr>=0.55?'#e3b341':r.wr<=0.4?'#f85149':'#8b949e';
      const dirLabel = r.wr>=0.55?'↑ 利多':r.wr<=0.45?'↓ 利空':'→ 中性';
      const dirColor = r.wr>=0.55?'#3fb950':r.wr<=0.45?'#f85149':'#8b949e';
      const avgColor = r.avg>=0?'#3fb950':'#f85149';
      return `<div class="sig-rule-item" style="${hl?`border-color:${sc}`:''}">
        <span class="sri-ticker" style="color:${sc}">${st}</span>
        <span class="sri-desc">${r.label.replace(/<[^>]+>/g,'')}</span>
        <span class="sri-wr" style="color:${wrColor}">历史胜率 ${Math.round(r.wr*100)}%（${r.wins}/${r.n}次）</span>
        <span style="color:${avgColor};font-size:10px">均收益 ${r.avg>0?'+':''}${r.avg.toFixed(2)}%</span>
        <span class="sri-dir" style="color:${dirColor}">${dirLabel}</span>
      </div>`;
    };
    const sepHtml = otherHits.length ? '<div style="font-size:10px;color:#8b949e;padding:8px 4px 4px">其他标的信号</div>' : '';
    rulesList.innerHTML =
      top1Rules.slice(0,6).map((r,i) => ruleHtml(r, top1.color, top1.ticker, i===0)).join('') +
      sepHtml +
      otherHits.slice(0,4).map(r => ruleHtml(r, r.color, r.ticker, false)).join('');
  }

  // ── Miss analysis + LR（推到空闲帧，不阻塞主内容展示）──
  const _maArgs = [stockSignals, actualsMap, ruleHits, targetDate, condByKey, nextDate, isLatest];
  if (typeof requestIdleCallback !== 'undefined') {
    requestIdleCallback(() => {
      renderMissAnalysis(..._maArgs); // 全部7个参数（含isLatest）
      if (_maArgs[6]) renderRealtimeLR(_maArgs[3]);
    }, { timeout: 2000 });
  } else {
    setTimeout(() => {
      renderMissAnalysis(..._maArgs);
      if (_maArgs[6]) renderRealtimeLR(_maArgs[3]);
    }, 50);
  }
}

function renderRealtimeLR(targetDate) {
  const parent = document.getElementById('miss-analysis')?.parentElement;
  if (!parent) return;
  let el = document.getElementById('realtime-lr-panel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'realtime-lr-panel';
    el.style.cssText = 'margin-top:14px;border-top:1px solid var(--border);padding-top:12px';
    parent.appendChild(el);
  }

  const nqf = futuresData['NQ=F'];
  const esf = futuresData['ES=F'];
  const nqChg = nqf?.intradayChg;
  const esChg = esf?.intradayChg;

  if (nqChg == null && esChg == null) {
    el.innerHTML = '<div style="font-size:11px;color:var(--muted)">📡 期货数据加载中…</div>';
    return;
  }

  const dirColor = d => d === 'long' ? '#3fb950' : d === 'short' ? '#f85149' : '#8b949e';
  const dirWord  = d => d === 'long' ? '▲ 今日看涨' : d === 'short' ? '▼ 今日看跌' : '— 观望';

  const fmtChg = (v, suffix='') => v == null ? '—'
    : `<span style="color:${v>=0?'#3fb950':'#f85149'};font-weight:700">${v>0?'+':''}${v.toFixed(2)}%${suffix}</span>`;

  const futBar = `
    <div style="padding:8px 10px;border-radius:7px;background:#0d1117;border:1px solid var(--border);
      margin-bottom:8px;display:flex;align-items:center;flex-wrap:wrap;gap:4px">
      <span style="font-size:10px;color:var(--muted);margin-right:8px">期货实时：</span>
      ${nqf ? `<span style="margin-right:14px;font-size:11px"><span style="color:var(--muted)">NQ=F </span>$${nqf.realtimePrice?.toFixed(2)} ${fmtChg(nqChg)}</span>` : ''}
      ${esf ? `<span style="font-size:11px"><span style="color:var(--muted)">ES=F </span>$${esf.realtimePrice?.toFixed(2)} ${fmtChg(esChg)}</span>` : ''}
    </div>`;

  const rows = SYMBOLS.filter(s => s.ticker !== 'QQQ').map(({ ticker, color, name }) => {
    const fp  = futuresPredict(ticker);     // 今日收盘预测（期货实时）
    const fop = futuresOpenPredict(ticker); // 次日收盘预测（期货开盘模拟）
    const d   = stockData[ticker];
    if (!d) return null;
    return { ticker, color, name, fp, fop, price: d.realtimePrice, intradayChg: d.intradayChg };
  }).filter(r => r.fp || r.fop);

  // 今日收盘预测排名
  const sorted   = [...rows].filter(r=>r.fp).sort((a, b) => b.fp.score - a.fp.score);
  const topLong  = sorted.find(r => r.fp.dir === 'long');
  const topShort = [...sorted].reverse().find(r => r.fp.dir === 'short');

  // 次日收盘预测排名
  const sortedNext    = [...rows].filter(r=>r.fop).sort((a, b) => b.fop.score - a.fop.score);
  const topLongNext   = sortedNext.find(r => r.fop.dir === 'long');
  const topShortNext  = [...sortedNext].reverse().find(r => r.fop.dir === 'short');

  const fmtWR = (wr) => wr ? `历史同向胜率 <strong style="color:var(--text)">${(wr.rate*100).toFixed(0)}%</strong>（${wr.n}次）` : '';
  const fmtContrib = (beta, now, contrib, sym) => now != null
    ? `${sym} ${now>0?'+':''}${now.toFixed(2)}% × 系数${beta.toFixed(2)} = <strong style="color:${contrib>=0?'#3fb950':'#f85149'}">${contrib>0?'+':''}${contrib.toFixed(2)}%</strong>` : '';

  const recCard = (r, side) => {
    if (!r) return '';
    const { fp, ticker, color, name, price } = r;
    const borderColor = side === 'long' ? '#3fb950' : '#f85149';
    const label       = side === 'long' ? '▲ 最强看多' : '▼ 最强看空';
    const labelColor  = side === 'long' ? '#3fb950' : '#f85149';
    const nqLine  = fmtContrib(fp.nqBeta, fp.nqNow, fp.nqContrib, 'NQ=F');
    const esLine  = fmtContrib(fp.esBeta, fp.esNow, fp.esContrib, 'ES=F');
    const nqWR    = fmtWR(fp.nqWinRate);
    const esWR    = fmtWR(fp.esWinRate);
    const total   = fp.nqContrib + fp.esContrib;
    return `
    <div style="flex:1;min-width:0;border:1px solid ${borderColor};border-radius:10px;padding:10px 12px;background:#0d1117">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="color:${color};font-size:15px;font-weight:800">${ticker}</span>
        <span style="color:${labelColor};font-weight:700;font-size:12px">${label}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);line-height:1.9">
        ${price != null ? `<div>当前价格 <strong style="color:var(--text)">$${price.toFixed(2)}</strong></div>` : ''}
        ${nqLine ? `<div>${nqLine}</div>` : ''}
        ${esLine ? `<div>${esLine}</div>` : ''}
        <div>综合预测收盘 <strong style="color:${total>=0?'#3fb950':'#f85149'}">${total>0?'+':''}${total.toFixed(2)}%</strong></div>
        ${nqWR ? `<div>${nqWR}</div>` : ''}
        ${esWR ? `<div style="margin-top:2px">${esWR}</div>` : ''}
      </div>
    </div>`;
  };

  // 次日预测卡片（QQQ开盘涨跌代理 → 次日个股收盘）
  const recCardNext = (r, side) => {
    if (!r || !r.fop) return '';
    const { fop, ticker, color, price } = r;
    const borderColor = side === 'long' ? '#3fb950' : '#f85149';
    const label       = side === 'long' ? '▲ 次日看多' : '▼ 次日看空';
    const labelColor  = side === 'long' ? '#3fb950' : '#f85149';
    const nqDir   = fop.nqNow >= 0 ? '+' : '';
    const betaStr = fop.beta != null ? fop.beta.toFixed(2) : '—';

// 检查某条观测是否命中某组过滤条件（命中任意一条则该信号应被过滤为中性）
function checkMissFilter(obs, filters) {
  if (!filters || !filters.length) return false;
  for (const f of filters) {
    const v = obs[f.field];
    if (v != null && v >= f.lo && v < f.hi) return true;
  }
  return false;
}

// ── Futures helpers ──────────────────────────────────────────────
let _futDateIdx = {}; // sym → Map<date, idx>

function _getFutIdx(sym) {
  if (!_futDateIdx[sym]) {
    const f = futuresHistory[sym];
    _futDateIdx[sym] = f ? new Map(f.dates.map((d, i) => [d, i])) : new Map();
  }
  return _futDateIdx[sym];
}

function getFuturesOpenChg(sym, date) {
  const f = futuresHistory[sym];
  if (!f) return null;
  const i = _getFutIdx(sym).get(date);
  return i != null ? (f.openChanges?.[i] ?? null) : null;
}

function getFuturesChg(sym, date) {
  const f = futuresHistory[sym];
  if (!f) return null;
  const i = _getFutIdx(sym).get(date);
  return i != null ? f.changes[i] : null;
}

function simpleLR(pts) {
  if (pts.length < 10) return 0;
  const n = pts.length;
  const mx = pts.reduce((s,[x])=>s+x,0)/n, my = pts.reduce((s,[,y])=>s+y,0)/n;
  const num = pts.reduce((s,[x,y])=>s+(x-mx)*(y-my),0);
  const den = pts.reduce((s,[x])=>s+(x-mx)**2,0);
  return den > 1e-10 ? num/den : 0;
}

function calcFutureBeta(ticker) {
  if (_cachedFutureBeta[ticker]) return _cachedFutureBeta[ticker];
  const d = stockData[ticker];
  if (!d) return { nq:0, es:0, nqPts:0, esPts:0, xNQ:[], xES:[] };
  const xNQ = [], xES = [];
  for (let i = 0; i < d.dates.length; i++) {
    const stockR = d.changes[i];
    if (stockR == null) continue;
    const nq = getFuturesChg('NQ=F', d.dates[i]);
    const es = getFuturesChg('ES=F', d.dates[i]);
    if (nq != null) xNQ.push([nq, stockR]);
    if (es != null) xES.push([es, stockR]);
  }
  const result = { nq: simpleLR(xNQ), es: simpleLR(xES), nqPts: xNQ.length, esPts: xES.length, xNQ, xES };
  _cachedFutureBeta[ticker] = result;
  return result;
}

function getQqqNextOpen(date) {
  const qqq = stockData['QQQ'];
  if (!qqq || !_qqqDateIdx) return null;
  const di = _qqqDateIdx.get(date);
  if (di == null || di + 1 >= qqq.dates.length) return null;
  const oc = qqq.openChanges || [];
  return oc[di + 1] ?? null;
}

function calcQqqOpenBeta(ticker) {
  if (_cachedFutureOpenBeta[ticker]) return _cachedFutureOpenBeta[ticker];
  const d   = stockData[ticker];
  const qqq = stockData['QQQ'];
  if (!d || !qqq) return { beta: 0, pts: 0, xPts: [] };
  const qqq_oc  = qqq.openChanges || [];
  const qIdx    = _qqqDateIdx || new Map(qqq.dates.map((dt, i) => [dt, i]));
  const xPts = [];
  for (let i = 0; i < d.dates.length - 1; i++) {
    const nextChg = d.changes[i + 1];
    if (nextChg == null) continue;
    const qi = qIdx.get(d.dates[i + 1]);
    if (qi == null || qqq_oc[qi] == null) continue;
    xPts.push([qqq_oc[qi], nextChg]);
  }
  const result = { beta: simpleLR(xPts), pts: xPts.length, xPts };
  _cachedFutureOpenBeta[ticker] = result;
  return result;
}

function calcWinRate(pts, futDir) {
  const filtered = pts.filter(([x]) => futDir > 0 ? x > 0 : x < 0);
  if (filtered.length < 5) return null;
  const wins = filtered.filter(([x, y]) => futDir > 0 ? y > 0 : y < 0).length;
  return { rate: wins / filtered.length, n: filtered.length };
}

function futuresPredict(ticker) {
  const fb    = calcFutureBeta(ticker);
  const nqNow = futuresData['NQ=F']?.intradayChg;
  const esNow = futuresData['ES=F']?.intradayChg;
  if (nqNow == null && esNow == null) return null;
  let predicted = 0, weight = 0;
  if (nqNow != null && fb.nqPts >= 10) { predicted += fb.nq * nqNow * fb.nqPts; weight += fb.nqPts; }
  if (esNow != null && fb.esPts >= 10) { predicted += fb.es * esNow * fb.esPts; weight += fb.esPts; }
  if (weight === 0) return null;
  predicted /= weight;
  const d = stockData[ticker];
  if (!d) return null;
  const vals = d.changes.filter(v => v != null);
  const mean = vals.reduce((s,v)=>s+v,0)/vals.length;
  const std  = Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length) || 1;
  const score = predicted / std;
  const dir = score > 0.15 ? 'long' : score < -0.15 ? 'short' : 'neut';
  const nqContrib = nqNow != null ? fb.nq * nqNow : 0;
  const esContrib = esNow != null ? fb.es * esNow : 0;
  return { dir, score, predicted, nqBeta: fb.nq, esBeta: fb.es, nqContrib, esContrib,
           nqNow, esNow,
           nqWinRate: nqNow != null ? calcWinRate(fb.xNQ, nqNow) : null,
           esWinRate: esNow != null ? calcWinRate(fb.xES, esNow) : null };
}

function futuresOpenPredict(ticker) {
  // 今日实时：用NQ=F盘中涨跌作为次日QQQ开盘的代理变量
  const fb    = calcQqqOpenBeta(ticker);
  const nqNow = futuresData['NQ=F']?.intradayChg
             ?? futuresHistory['NQ=F']?.intradayChg
             ?? futuresData['ES=F']?.intradayChg
             ?? futuresHistory['ES=F']?.intradayChg;
  if (nqNow == null || fb.pts < 10) return null;
  const predicted = fb.beta * nqNow;
  const d = stockData[ticker];
  if (!d) return null;
  const vals = d.changes.filter(v => v != null);
  const mean = vals.reduce((s,v)=>s+v,0)/vals.length;
  const std  = Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length) || 1;
  const score = predicted / std;
  const dir   = score > 0.15 ? 'long' : score < -0.15 ? 'short' : 'neut';
  return { dir, score, predicted, beta: fb.beta, nqNow,
           winRate: calcWinRate(fb.xPts, nqNow) };
}
