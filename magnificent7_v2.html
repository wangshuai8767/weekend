<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>美股七姐妹 · 近一周涨跌幅</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .title h1 { font-size: 17px; font-weight: 700; }
    header .title p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .refresh-btn:active { background: #21262d; }
    .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 12px 0;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .summary-card .val { font-size: 22px; font-weight: 700; }
    .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .up  { color: var(--green); }
    .dn  { color: var(--red); }
    .neu { color: var(--accent); }

    /* Stock grid */
    .stocks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
    }

    @media (min-width: 520px)  { .stocks-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px)  { .stocks-grid { grid-template-columns: repeat(4, 1fr); } }

    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      overflow: hidden;
    }

    .stock-card:active { transform: scale(0.96); }
    .stock-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .stock-card.up-card  { border-left: 3px solid var(--green); }
    .stock-card.dn-card  { border-left: 3px solid var(--red); }

    .stock-card .ticker { font-size: 14px; font-weight: 700; }
    .stock-card .sname  { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stock-card .price  { font-size: 15px; font-weight: 600; margin-top: 8px; }
    .stock-card .change { font-size: 12px; font-weight: 600; margin-top: 3px; }
    .mini-chart { margin-top: 8px; height: 38px; }

    /* Big chart */
    .chart-section {
      margin: 4px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .chart-section h2 {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chart-section h2 em { font-style: normal; color: var(--accent); font-size: 12px; }
    .chart-wrap { height: 220px; }

    /* Heatmap */
    .heatmap-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    .heatmap-section h2 { font-size: 13px; margin-bottom: 10px; }

    .hm-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      min-width: 360px;
    }

    .hm-table th {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
      padding: 3px;
    }

    .hm-table td.ticker-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      padding: 4px 6px;
      white-space: nowrap;
    }

    .hm-cell {
      border-radius: 6px;
      padding: 5px 3px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      min-width: 42px;
    }

    /* Error / loading */
    .error-bar {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.35);
      color: #f85149;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 10px 12px 0;
      font-size: 12px;
    }

    .loading-overlay {
      text-align: center;
      padding: 50px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot-flash { display: inline-flex; gap: 4px; margin-left: 4px; }
    .dot-flash span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
      animation: df 1.2s infinite;
    }
    .dot-flash span:nth-child(2) { animation-delay: .2s; }
    .dot-flash span:nth-child(3) { animation-delay: .4s; }
    @keyframes df { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    .skeleton {
      background: linear-gradient(90deg,#21262d 25%,#2d333b 50%,#21262d 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    .last-update { text-align: center; font-size: 11px; color: var(--muted); padding: 14px 0 0; }

    .data-src { text-align: center; font-size: 10px; color: #484f58; padding: 4px 0 16px; }

    /* ── Model PK section ── */
    .pk-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .pk-section h2 { font-size: 13px; margin-bottom: 4px; }
    .pk-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }

    .pk-scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pk-card {
      border-radius: 10px;
      border: 2px solid var(--border);
      padding: 14px;
      text-align: center;
      position: relative;
    }
    .pk-card.winner { border-color: #e3b341; box-shadow: 0 0 0 1px #e3b341; }
    .pk-card .pk-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .pk-card .pk-rate { font-size: 32px; font-weight: 900; }
    .pk-card .pk-detail { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .pk-card .pk-crown { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 18px; }

    .pk-history {
      overflow-x: auto;
    }
    .pk-history-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .pk-history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 500px;
    }
    .pk-history-table th {
      color: var(--muted); font-weight: 500;
      padding: 4px 8px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .pk-history-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }
    .pk-history-table tr:last-child td { border-bottom: none; }
    .pk-badge {
      display: inline-block; padding: 2px 7px; border-radius: 5px;
      font-weight: 700; font-size: 10px;
    }
    .pk-badge.hit-rule  { background: rgba(63,185,80,0.15);  color: #3fb950; border: 1px solid #3fb95055; }
    .pk-badge.miss-rule { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f8514955; }
    .pk-badge.hit-lr    { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #58a6ff55; }
    .pk-badge.miss-lr   { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f8514955; }
    .pk-badge.neut      { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    /* ── Rank winrate section ── */
    .rank-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .rank-section h2 { font-size: 13px; margin-bottom: 4px; }
    .rank-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }

    .rank-cards {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) { .rank-cards { grid-template-columns: repeat(4, 1fr); } }

    .rank-card {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
    }

    .rank-card .rk-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .rank-card .rk-pct { font-size: 18px; font-weight: 800; }
    .rank-card .rk-frac { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .rank-card .rk-avg  { font-size: 10px; margin-top: 3px; }
    .rank-card.best { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    .rank-card.worst { border-color: var(--red); }

    .rank-detail-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

    .rank-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .rank-detail-table th {
      color: var(--muted);
      font-weight: 500;
      padding: 4px 6px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .rank-detail-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }

    .rank-detail-table tr:last-child td { border-bottom: none; }

    .rank-badge {
      display: inline-block;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #21262d;
      text-align: center;
      line-height: 20px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── Today signal ── */
    .signal-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .signal-section h2 { font-size: 13px; margin-bottom: 10px; color: var(--muted); font-weight: 500; }

    /* Date picker row */
    .sig-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .sig-date-row label { font-size: 11px; color: var(--muted); }

    .sig-date-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      flex: 1;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }

    .sig-date-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .sig-date-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sig-date-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }
    .sig-date-btn.latest { border-color: #e3b341; color: #e3b341; }
    .sig-date-btn.latest.active { background: #e3b341; color: #0d1117; }

    /* Actual result banner */
    .actual-result {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 9px;
      background: #0d1117;
      border: 1px solid var(--border);
      font-size: 11px;
      align-items: center;
    }

    .actual-result .ar-label { color: var(--muted); margin-right: 4px; }
    .actual-result .ar-item  { display: flex; align-items: center; gap: 4px; }
    .actual-result .ar-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 10px; font-weight: 700; font-size: 11px;
    }
    .ar-badge.hit  { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
    .ar-badge.miss { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f85149; }

    /* Overall verdict */
    .verdict-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: stretch;
    }

    .verdict-main {
      flex: 1;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 2px solid transparent;
    }

    .verdict-main.long  { background: rgba(63,185,80,0.1);  border-color: #3fb950; }
    .verdict-main.short { background: rgba(248,81,73,0.1);  border-color: #f85149; }
    .verdict-main.neut  { background: rgba(139,148,158,0.08); border-color: #30363d; }

    .verdict-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .verdict-word {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .verdict-main.long  .verdict-word { color: #3fb950; }
    .verdict-main.short .verdict-word { color: #f85149; }
    .verdict-main.neut  .verdict-word { color: #8b949e; }

    .verdict-conf {
      font-size: 12px;
      margin-top: 6px;
      color: var(--muted);
    }

    .verdict-conf strong { color: var(--text); }

    /* Per-stock mini signals */
    .verdict-stocks {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 140px;
    }

    .vs-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1117;
      border-radius: 7px;
      padding: 5px 9px;
      gap: 8px;
      font-size: 11px;
    }

    .vs-ticker { font-weight: 700; width: 36px; }
    .vs-chg    { width: 48px; text-align: right; font-size: 10px; }
    .vs-dir    { font-weight: 700; font-size: 11px; width: 28px; text-align: right; }

    /* Hit rules list */
    .sig-rules-title {
      font-size: 11px;
      color: var(--muted);
      margin: 4px 0 8px;
    }

    .sig-rule-item {
      display: grid;
      grid-template-columns: 36px 1fr auto auto auto;
      align-items: center;
      padding: 7px 10px;
      border-radius: 7px;
      background: #0d1117;
      border: 1px solid var(--border);
      margin-bottom: 5px;
      font-size: 11px;
      gap: 8px;
    }

    .sig-rule-item .sri-desc { color: var(--text); }
    .sig-rule-item .sri-ticker { font-weight: 700; }
    .sig-rule-item .sri-wr { font-weight: 700; white-space: nowrap; }
    .sig-rule-item .sri-dir { white-space: nowrap; font-size: 10px; }

    /* ── Rule miner ── */
    .miner-section {
      margin: 10px 12px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .miner-section h2 { font-size: 13px; margin-bottom: 4px; }
    .miner-section .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }

    .miner-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .miner-controls label { font-size: 11px; color: var(--muted); }

    .miner-controls select {
      background: #0d1117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
    }

    .rule-list { display: flex; flex-direction: column; gap: 6px; }

    .rule-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
    }

    .rule-row.top1 { border-color: #3fb950; background: rgba(63,185,80,0.05); }
    .rule-row.top2 { border-color: rgba(63,185,80,0.5); }

    .rule-desc { color: var(--text); line-height: 1.5; }
    .rule-desc strong { color: var(--accent); }

    .rule-wr {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .rule-avg { font-size: 11px; white-space: nowrap; text-align: right; }
    .rule-n   { font-size: 10px; color: var(--muted); white-space: nowrap; }

    .no-rules { color: var(--muted); font-size: 12px; padding: 12px 0; text-align: center; }

    /* ── Miss analysis ── */
    .miss-section {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .miss-title {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .miss-card {
      background: #0d1117;
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 9px;
      padding: 10px 12px;
      margin-bottom: 7px;
      font-size: 11px;
    }

    .miss-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .miss-card-header .mc-ticker { font-weight: 700; font-size: 13px; }
    .miss-card-header .mc-pred   { padding: 2px 8px; border-radius: 5px; font-weight: 700; font-size: 11px; }
    .miss-card-header .mc-actual { font-size: 11px; font-weight: 600; }
    .miss-card-header .mc-badge  {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.4);
    }

    .miss-reason {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .miss-reason-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      background: #161b22;
      line-height: 1.5;
    }

    .miss-reason-row .mr-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .miss-reason-row .mr-text { color: var(--text); flex: 1; }
    .miss-reason-row .mr-text em { font-style: normal; color: #e3b341; font-weight: 600; }
    .miss-reason-row .mr-text s  { color: var(--muted); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 0;
      flex-wrap: wrap;
    }

    .filter-bar span { font-size: 12px; color: var(--muted); }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  <div class="title">
    <h1>🚀 美股七姐妹</h1>
    <p id="date-range">近一周每日涨跌幅</p>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
    <span class="spin">↻</span> 刷新
  </button>
</header>

<div id="error-zone"></div>

<div class="filter-bar" id="filter-bar">
  <span>时间范围：</span>
  <button class="filter-btn" data-days="5"   onclick="setFilter(5)">近1周</button>
  <button class="filter-btn" data-days="10"  onclick="setFilter(10)">近2周</button>
  <button class="filter-btn" data-days="21"  onclick="setFilter(21)">近1个月</button>
  <button class="filter-btn" data-days="63"  onclick="setFilter(63)">近3个月</button>
  <button class="filter-btn active" data-days="0" onclick="setFilter(0)">近1年</button>
</div>

<div id="main-content">
  <div class="loading-overlay">
    加载中<span class="dot-flash"><span></span><span></span><span></span></span>
  </div>
</div>

<script>
const SYMBOLS = [
  { ticker: 'AAPL',  name: 'Apple',     color: '#58a6ff' },
  { ticker: 'MSFT',  name: 'Microsoft', color: '#79c0ff' },
  { ticker: 'NVDA',  name: 'NVIDIA',    color: '#56d364' },

function setFilter(days) {

  });
  // Re-render with filtered dates, no re-fetch needed

function getFilteredDates() {
  const sample = Object.values(stockData).find(v => v);
  if (!sample) return [];
  const allDates = sample.dates.filter((_, i) => sample.changes[i] !== null);
  return filterDays > 0 ? allDates.slice(-filterDays) : allDates;
}

  if (!dates.length) return;

// ── Date helpers ────────────────────────────────────────────────
function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(ymd) {
  const [,m,d] = ymd.split('-');
  return `${+m}/${+d}`;
}

function fmtDateShort(ymd) {
  const days = ['日','一','二','三','四','五','六'];
  const dt = new Date(ymd + 'T12:00:00');
  return `${+ymd.slice(5,7)}/${+ymd.slice(8,10)} 周${days[dt.getDay()]}`;
}

// ── Fetch futures realtime quote (5m, 5d) ────────────────────────
async function fetchFuturesQuote(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1m&range=1d&_=${Date.now()}`;
  const attempts = [
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`).then(r => r.ok ? r.json() : Promise.reject()),
    () => fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`).then(async r => {
            if (!r.ok) throw 0;
            return JSON.parse((await r.json()).contents);
          }),
  ];
  let json = null;
  for (const a of attempts) { try { json = await a(); break; } catch(e) {} }
  if (!json) return fetchYahoo(ticker); // fallback到日线

  const result = json?.chart?.result?.[0];
  if (!result) return fetchYahoo(ticker);

  const meta          = result.meta;
  const timestamps    = result.timestamp;
  const closes        = result.indicators.quote[0].close;
  const realtimePrice = meta.regularMarketPrice;

  // 1m接口的 previousClose 是准确的上一交易日收盘价
  const prevClose = meta.previousClose ?? meta.chartPreviousClose ?? closes.filter(Boolean).slice(-2)[0];

  const intradayChg = prevClose && realtimePrice
    ? +((realtimePrice - prevClose) / prevClose * 100).toFixed(2)
    : null;

  return { realtimePrice, intradayChg, intradayOtc: null, lastClose: prevClose, ticker };
}

// ── Fetch Yahoo Finance — multi-proxy fallback chain ────────────
// file:// origin is "null" which blocks most CORS proxies.
// Strategy: try several proxies in order until one works.
async function fetchYahoo(ticker) {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y&_=${Date.now()}`;

  const attempts = [
    // 1. corsproxy.io
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`),
    // 2. allorigins (wrapped JSON)
    () => fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`)
          .then(async r => {
            if (!r.ok) throw new Error(r.status);
            const w = await r.json();
            return { ok: true, _allorigins: true, _contents: w.contents };
          }),
    // 3. thingproxy
    () => fetch(`https://thingproxy.freeboard.io/fetch/${yahooUrl}`),
    // 4. cors-anywhere
    () => fetch(`https://cors-anywhere.herokuapp.com/${yahooUrl}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' } }),
    // 5. Direct last (CORS error expected on localhost, but works on some setups)
    () => fetch(yahooUrl),
  ];

  let lastErr;
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      if (res._allorigins) {
        return parseYahooChart(JSON.parse(res._contents), ticker);
      }
      if (!res.ok) continue;
      const json = await res.json();
      return parseYahooChart(json, ticker);
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('all proxies failed');
}

function parseYahooChart(json, ticker) {
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('no data');

  const timestamps = result.timestamp;
  const rawOpens  = result.indicators.quote[0].open;
  const closes    = result.indicators.quote[0].close;
  const adjCloses = result.indicators.adjclose?.[0]?.adjclose || closes;
  const meta = result.meta;

  const dates = timestamps.map(ts => {
    const nyDate = new Date(ts * 1000 + (meta.gmtoffset || -14400) * 1000);
    return toYMD(nyDate);
  });

  // daily % change vs prev close (adj)
  const changes = adjCloses.map((c, i) => {
    if (i === 0) return null;
    const prev = adjCloses[i - 1];
    if (!prev || !c) return null;
    return +((c - prev) / prev * 100).toFixed(2);
  });

  // intraday open-to-close % (open vs close, using raw prices)
  const openToClose = closes.map((c, i) => {
    const o = rawOpens[i];
    if (!o || !c) return null;
    return +((c - o) / o * 100).toFixed(2);
  });

  const lastClose  = closes[closes.length - 1] ?? meta.regularMarketPrice;
  const lastChange = changes[changes.length - 1];

  // 实时价格（15分钟延迟）
  const realtimePrice = meta.regularMarketPrice ?? lastClose;
  // 昨收：用倒数第二根K线（最后一根K线收盘=今日实时价，倒数第二才是真正昨收）
  const prevClose = closes[closes.length - 2] ?? closes[closes.length - 1];
  // 涨跌幅：实时价 vs 昨收
  const intradayChg = prevClose && realtimePrice
    ? +((realtimePrice - prevClose) / prevClose * 100).toFixed(2)
    : null;
  // 今日开盘
  const todayOpen = meta.regularMarketOpen ?? rawOpens[rawOpens.length - 1];
  const intradayOtc = todayOpen && todayOpen > 0 && prevClose && Math.abs(todayOpen - prevClose) / prevClose > 0.0001
    ? +((realtimePrice - todayOpen) / todayOpen * 100).toFixed(2)
    : null;

  return { dates, closes: adjCloses, changes, openToClose, lastClose, lastChange,
           realtimePrice, intradayChg, intradayOtc, ticker };
}

async function loadAll() {
  if (realtimeTimer) { clearInterval(realtimeTimer); realtimeTimer = null; }
  clearError();
  setLoading(true);
  document.getElementById('main-content').innerHTML =
    `<div class="loading-overlay">加载中<span class="dot-flash"><span></span><span></span><span></span></span></div>`;

  const FUTURES = ['NQ=F', 'ES=F'];
  const [results, futResults, futHistResults] = await Promise.all([
    Promise.allSettled(SYMBOLS.map(s => fetchYahoo(s.ticker))),
    Promise.allSettled(FUTURES.map(f => fetchFuturesQuote(f))),
    Promise.allSettled(FUTURES.map(f => fetchYahoo(f))), // 历史日线
  ]);

  stockData = {};
  let anyFail = false;
  results.forEach((r, i) => {
    const ticker = SYMBOLS[i].ticker;
    if (r.status === 'fulfilled') {
      stockData[ticker] = r.value;
    } else {
      stockData[ticker] = null;
      anyFail = true;
      console.warn(ticker, r.reason);
    }
  });

  futuresData = {};
  futResults.forEach((r, i) => {
    if (r.status === 'fulfilled') futuresData[FUTURES[i]] = r.value;
  });

  futuresHistory = {};
  futHistResults.forEach((r, i) => {
    if (r.status === 'fulfilled') futuresHistory[FUTURES[i]] = r.value;
  });

  if (anyFail) showError('部分数据加载失败（Yahoo Finance 限速或代理超时），请稍后点击刷新重试。');

  const dates = getFilteredDates();
  updateDateRange(dates);
  renderAll(dates);
  setLoading(false);
}

// ── Stock cards ──────────────────────────────────────────────────
function renderCards(weekDates) {
  const grid = document.getElementById('stocks-grid');
  if (!grid) return;
  grid.innerHTML = '';

  SYMBOLS.forEach(({ ticker, name }) => {
    const d = stockData[ticker];
    const card = document.createElement('div');
    card.className = 'stock-card' + (ticker === selectedTicker ? ' selected' : '');

    if (!d) {
      card.innerHTML = `<div class="ticker">${ticker}</div><div class="sname">${name}</div>
        <div class="skeleton" style="height:14px;margin-top:8px"></div>
        <div class="skeleton" style="height:10px;margin-top:5px;width:55%"></div>`;
      grid.appendChild(card);
      return;
    }

    const isUp = (d.lastChange ?? 0) >= 0;
    card.classList.add(isUp ? 'up-card' : 'dn-card');

    const sparkId = `spark-${ticker}`;
    const chgStr = d.lastChange != null
      ? `${isUp ? '▲' : '▼'} ${Math.abs(d.lastChange).toFixed(2)}%`
      : '—';

    card.innerHTML = `
      <div class="ticker">${ticker}</div>
      <div class="sname">${name}</div>
      <div class="price ${isUp ? 'up' : 'dn'}">$${(d.lastClose ?? 0).toFixed(2)}</div>
      <div class="change ${isUp ? 'up' : 'dn'}">${chgStr}</div>
      <div class="mini-chart"><canvas id="${sparkId}"></canvas></div>`;

    card.addEventListener('click', () => {
      selectedTicker = ticker;
      renderCards(weekDates);
      renderLineChart(weekDates);
      const lbl = document.getElementById('chart-lbl');
      if (lbl) lbl.textContent = `${ticker} 已选中`;
    });

    grid.appendChild(card);
    requestAnimationFrame(() => drawSparkline(sparkId, d, weekDates));
  });
}

function getWeekChanges(d, weekDates) {
  return weekDates.map(date => {
    const idx = d.dates.indexOf(date);
    if (idx < 0 || d.changes[idx] == null) return 0;
    return d.changes[idx];
  });
}

function drawSparkline(id, d, weekDates) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const vals = getWeekChanges(d, weekDates);
  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: weekDates.map(fmtDate),
      datasets: [{
        data: vals,
        backgroundColor: vals.map(v => v >= 0 ? '#3fb950' : '#f85149'),
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } }
    }
  });
}

// ── Line chart ───────────────────────────────────────────────────
function renderLineChart(weekDates) {
  const canvas = document.getElementById('line-chart');
  if (!canvas) return;
  if (lineChart) { lineChart.destroy(); lineChart = null; }

  const datasets = SYMBOLS.map(({ ticker, color }) => {
    const d = stockData[ticker];
    const changes = d ? getWeekChanges(d, weekDates) : weekDates.map(() => null);
    const isSel = ticker === selectedTicker;
    return {
      label: ticker,
      data: changes,
      borderColor: color,
      backgroundColor: color + '18',
      borderWidth: isSel ? 2.5 : 1.2,
      borderDash: isSel ? [] : [5, 4],
      pointRadius: isSel ? 4 : 2,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.35,
      spanGaps: true,
    };
  });

  lineChart = new Chart(canvas, {
    type: 'line',
    data: { labels: weekDates.map(fmtDate), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true, position: 'top',
          labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 18, padding: 8 }
        },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#8b949e',
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return ` ${ctx.dataset.label}: —`;
              return ` ${ctx.dataset.label}: ${v > 0 ? '+' : ''}${v.toFixed(2)}%`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' } },
        y: {
          ticks: {
            color: '#8b949e', font: { size: 11 },
            callback: v => (v > 0 ? '+' : '') + v.toFixed(1) + '%'
          },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

// ── Heatmap ──────────────────────────────────────────────────────
function renderHeatmap(weekDates) {
  const table = document.getElementById('heatmap');
  if (!table) return;

  // Header row
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th></th>' +
    weekDates.map(d => `<th>${fmtDate(d)}<br><span style="font-size:9px;color:#484f58">${['日','一','二','三','四','五','六'][new Date(d+'T12:00:00').getDay()]}</span></th>`).join('') +
    '</tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    const row = document.createElement('tr');
    row.innerHTML = `<td class="ticker-label">${ticker}</td>`;

    weekDates.forEach(date => {
      const td = document.createElement('td');
      td.className = 'hm-cell';
      const idx = d?.dates?.indexOf(date) ?? -1;
      const v = (idx >= 0 && d.changes[idx] != null) ? d.changes[idx] : null;

      if (v === null) {
        td.style.background = '#21262d';
        td.style.color = '#8b949e';
        td.textContent = '—';
      } else {
        const intensity = Math.min(Math.abs(v) / 4, 1);
        const alpha = 0.2 + intensity * 0.65;
        if (v >= 0) {
          td.style.background = `rgba(63,185,80,${alpha})`;
          td.style.color = intensity > 0.5 ? '#fff' : '#3fb950';
        } else {
          td.style.background = `rgba(248,81,73,${alpha})`;
          td.style.color = intensity > 0.5 ? '#fff' : '#f85149';
        }
        td.textContent = (v > 0 ? '+' : '') + v.toFixed(2) + '%';
      }
      row.appendChild(td);
    });

    tbody.appendChild(row);
  });
  table.appendChild(tbody);
}

let signalDate = null; // null = latest
let realtimeTimer = null;

async function refreshRealtime() {
  const FUTURES = ['NQ=F', 'ES=F'];
  // 更新期货
  const futResults = await Promise.allSettled(FUTURES.map(f => fetchFuturesQuote(f)));
  futResults.forEach((r, i) => {
    if (r.status === 'fulfilled') futuresData[FUTURES[i]] = r.value;
  });
  // 更新个股实时价
  const stockResults = await Promise.allSettled(
    SYMBOLS.map(s => fetchFuturesQuote(s.ticker)) // 同接口，1m range=1d
  );
  stockResults.forEach((r, i) => {
    const ticker = SYMBOLS[i].ticker;
    if (r.status !== 'fulfilled' || !stockData[ticker]) return;
    stockData[ticker].realtimePrice = r.value.realtimePrice;
    stockData[ticker].intradayChg   = r.value.intradayChg;
    stockData[ticker].intradayOtc   = r.value.intradayOtc;
  });
  // 重新渲染实时面板
  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const allDates = [...allDatesSet].sort();
  const targetDate = signalDate || allDates[allDates.length - 1];
  if (targetDate === allDates[allDates.length - 1]) renderRealtimeLR(targetDate);
}

      btn.textContent = (i === 0 ? '今日 ' : '') + fmtDate(dt) + ' 周' + days[d.getDay()];
      btn.dataset.date = dt;
      btn.onclick = () => {
        signalDate = dt;
        document.querySelectorAll('.sig-date-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSignalForDate(dt, allDates);
      };
      scrollEl.appendChild(btn);
    });
  }

  const targetDate = signalDate || allDates[allDates.length - 1];
  renderSignalForDate(targetDate, allDates);
}

function renderSignalForDate(targetDate, allDates) {
  const verdictRow = document.getElementById('verdict-row');
  const rulesTitleEl = document.getElementById('sig-rules-title');
  const rulesList    = document.getElementById('sig-rules-list');
  const actualEl     = document.getElementById('actual-result');
  if (!verdictRow) return;

  const isLatest  = targetDate === allDates[allDates.length - 1];
  const dateIdx   = allDates.indexOf(targetDate);
  const nextDate  = dateIdx >= 0 && dateIdx < allDates.length - 1 ? allDates[dateIdx + 1] : null;

  // Build per-stock snapshot for targetDate
  // IMPORTANT: observations must only use data UP TO targetDate (no lookahead)
  const todayRow = SYMBOLS.map(({ ticker, color, name }) => {
    const d = stockData[ticker];
    if (!d) return null;
    const ti = d.dates.indexOf(targetDate);
    if (ti < 0 || d.changes[ti] == null) return null;
    const pi = ti > 0 ? ti - 1 : -1;
    return { ticker, color, name,
      todayChg: d.changes[ti],
      prevChg:  pi >= 0 ? d.changes[pi] : null };
  }).filter(Boolean);

  if (!todayRow.length) {
    verdictRow.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">该日期无数据</div>';
    return;
  }

  // Rank + breadth
  const sorted = [...todayRow].sort((a, b) => b.todayChg - a.todayChg);
  sorted.forEach((e, i) => { e.rank = i + 1; e.total = sorted.length; });
  const marketUpCount = todayRow.filter(e => e.todayChg > 0).length;
  todayRow.forEach(e => { e.marketUpCount = marketUpCount; });

  // Use only observations strictly BEFORE targetDate for rule scoring (no data leakage)
  const obs = buildObservations().filter(o => o.date < targetDate);
  const allConds = [...CONDITIONS, ...buildComboConds()];

  const stockSignals = todayRow.map(stock => {
    const hitRules = [];
    allConds.forEach(cond => {
      if (!cond.fn(stock)) return;
      const hist = obs.filter(o => o.ticker === stock.ticker && cond.fn(o));
      if (hist.length < 3) return;
      const wins = hist.filter(o => o.nextChg > 0).length;
      const wr   = wins / hist.length;
      const avg  = hist.reduce((s, o) => s + o.nextChg, 0) / hist.length;
      hitRules.push({ label: cond.label, wr, avg, n: hist.length, wins });
    });
    let wSum = 0, wTot = 0;
    hitRules.forEach(r => { wSum += (r.wr - 0.5) * r.n; wTot += r.n; });
    const longScore = wTot > 0 ? wSum / wTot : 0;
    return { ...stock, hitRules, longScore };
  });

  const totalScore = stockSignals.reduce((s, x) => s + x.longScore, 0) / stockSignals.length;
  const conf = Math.min(100, Math.abs(totalScore) / 0.3 * 100);
  const confLabel = conf >= 70 ? '高置信度' : conf >= 40 ? '中置信度' : '低置信度';
  const overallDir  = totalScore > 0.05 ? 'long' : totalScore < -0.05 ? 'short' : 'neut';
  const overallWord = overallDir === 'long' ? '做多' : overallDir === 'short' ? '做空' : '观望';

  stockSignals.sort((a, b) => b.longScore - a.longScore);
  const top1    = stockSignals[0];
  const top1Dir = top1.longScore > 0.05 ? 'long' : top1.longScore < -0.05 ? 'short' : 'neut';

  // ── Build actuals map ──
  const actualsMap = {};
  if (nextDate) {
    stockSignals.forEach(s => {
      const d = stockData[s.ticker];
      const ni = d ? d.dates.indexOf(nextDate) : -1;
      actualsMap[s.ticker] = ni >= 0 && d.changes[ni] != null ? d.changes[ni] : null;
    });
  }
  const hasActuals = Object.values(actualsMap).some(v => v !== null);

  // Valid predicted (non-neut) hits
  const validPredicted = stockSignals.filter(s => Math.abs(s.longScore) > 0.05);
  const hitCount = validPredicted.filter(s => {
    const nc = actualsMap[s.ticker];
    if (nc === null) return false;
    return s.longScore > 0 ? nc > 0 : nc < 0;
  }).length;
  const hitRate = hasActuals && validPredicted.length ? hitCount / validPredicted.length : null;

  if (actualEl) actualEl.innerHTML = '';

  // ── Verdict summary row ──
  verdictRow.innerHTML = '';
  const dateLabel = isLatest ? '明日操作建议' : `${fmtDate(targetDate)} 收盘后建议`;

  const main = document.createElement('div');
  main.className = `verdict-main ${overallDir}`;
  let hitRateHtml = '';
  if (hitRate !== null) {
    const rc = hitRate >= 0.6 ? '#3fb950' : hitRate >= 0.4 ? '#e3b341' : '#f85149';
    hitRateHtml = `<div style="margin-top:8px;padding:6px 10px;border-radius:7px;background:#0d1117;font-size:12px">
      次日命中率 <strong style="color:${rc};font-size:15px">${Math.round(hitRate*100)}%</strong>
      <span style="color:var(--muted);font-size:10px"> (${hitCount}/${validPredicted.length}只)</span>
    </div>`;
  } else if (isLatest) {
    hitRateHtml = `<div style="margin-top:8px;font-size:10px;color:var(--muted)">次日结果待定</div>`;
  }
  main.innerHTML = `
    <div class="verdict-label">${dateLabel}</div>
    <div class="verdict-word">${overallWord}</div>
    <div style="font-size:13px;font-weight:700;margin:6px 0 2px;color:${top1.color}">
      首选：${top1.ticker} · ${top1.name}
    </div>
    <div class="verdict-conf">
      置信度 <strong>${conf.toFixed(0)}%</strong> · ${confLabel} ·
      <span style="font-size:10px">${obs.length} 条历史观测</span>
    </div>
    ${hitRateHtml}
  `;
  verdictRow.appendChild(main);

  // ── Per-stock comparison table ──
  const tableWrap = document.createElement('div');
  tableWrap.className = 'verdict-stocks';

  // Header
  const hdr = document.createElement('div');
  hdr.style.cssText = `font-size:10px;color:var(--muted);padding:3px 10px 5px;
    display:grid;grid-template-columns:40px 60px 52px 14px ${hasActuals?'62px 56px':''};gap:6px;align-items:center`;
  hdr.innerHTML = `<span>标的</span><span>模型建议</span><span style="text-align:center">当日涨跌</span><span></span>
    ${hasActuals ? `<span style="text-align:center">次日实际</span><span style="text-align:center">结果</span>` : ''}`;
  tableWrap.appendChild(hdr);

  stockSignals.forEach((s, idx) => {
    const dir      = s.longScore > 0.05 ? 'long' : s.longScore < -0.05 ? 'short' : 'neut';
    const dirWord  = dir === 'long' ? '▲ 做多' : dir === 'short' ? '▼ 做空' : '— 观望';
    const dirColor = dir === 'long' ? '#3fb950' : dir === 'short' ? '#f85149' : '#8b949e';
    const dirBg    = dir === 'long' ? 'rgba(63,185,80,0.12)' : dir === 'short' ? 'rgba(248,81,73,0.12)' : 'transparent';
    const todayColor = s.todayChg >= 0 ? '#3fb950' : '#f85149';
    const barPct   = Math.min(100, Math.abs(s.longScore) / 0.3 * 100).toFixed(0);

    const nextChg = actualsMap[s.ticker] ?? null;
    const hit = nextChg === null || dir === 'neut' ? null : dir === 'long' ? nextChg > 0 : nextChg < 0;
    const nextColor = nextChg === null ? '#8b949e' : nextChg >= 0 ? '#3fb950' : '#f85149';
    const hitBg    = hit === null ? 'transparent' : hit ? 'rgba(63,185,80,0.15)' : 'rgba(248,81,73,0.15)';
    const hitColor = hit === null ? '#8b949e' : hit ? '#3fb950' : '#f85149';
    const hitWord  = hit === null ? '—' : hit ? '✓ 命中' : '✗ 未中';

    const cols = `40px 60px 52px 14px ${hasActuals ? '62px 56px' : ''}`;
    const row = document.createElement('div');
    row.className = 'vs-row';
    row.style.cssText = `display:grid;grid-template-columns:${cols};gap:6px;align-items:center;
      ${idx === 0 ? `border-color:${dirColor};` : ''}`;

    row.innerHTML = `
      <span style="color:${s.color};font-weight:700;font-size:11px">${idx===0?'⭐':''} ${s.ticker}</span>
      <span style="background:${dirBg};color:${dirColor};font-weight:700;font-size:11px;
        padding:3px 6px;border-radius:6px;text-align:center;
        border:1px solid ${dir==='neut'?'transparent':dirColor+'55'}">
        ${dirWord}
        <div style="height:2px;background:#21262d;border-radius:1px;margin-top:3px;overflow:hidden">
          <div style="height:100%;width:${barPct}%;background:${dirColor};border-radius:1px"></div>
        </div>
      </span>
      <span style="color:${todayColor};font-size:11px;text-align:center">
        ${s.todayChg>0?'+':''}${s.todayChg.toFixed(2)}%
      </span>
      <span style="color:var(--muted);font-size:12px;text-align:center">→</span>
      ${hasActuals ? `
        <span style="color:${nextColor};font-size:11px;font-weight:600;text-align:center">
          ${nextChg !== null ? (nextChg>0?'+':'') + nextChg.toFixed(2)+'%' : '—'}
        </span>
        <span style="background:${hitBg};color:${hitColor};font-size:10px;font-weight:700;
          padding:2px 6px;border-radius:5px;text-align:center;
          border:1px solid ${hit===null?'transparent':hitColor+'55'}">
          ${hitWord}
        </span>
      ` : ''}
    `;
    tableWrap.appendChild(row);
  });
  verdictRow.appendChild(tableWrap);

  // ── Rules ──
  const top1Rules = [...top1.hitRules].sort((a, b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5));
  const otherHits = [];
  stockSignals.slice(1).forEach(s => s.hitRules.forEach(r => otherHits.push({...r, ticker:s.ticker, color:s.color})));
  otherHits.sort((a, b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5));
  const totalRuleCount = stockSignals.reduce((s, x) => s + x.hitRules.length, 0);

  if (rulesTitleEl) rulesTitleEl.innerHTML = top1Rules.length
    ? `<strong style="color:${top1.color}">${top1.ticker}</strong> ${top1Dir==='long'?'做多':'做空'}的依据（${top1Rules.length} 条规则 · 全部共 ${totalRuleCount} 条）`
    : '无有效规则触发（历史数据不足3次）';

  if (rulesList) {
    rulesList.innerHTML = '';
    const renderRule = (r, sc, st, hl) => {
      const wrColor  = r.wr>=0.65?'#3fb950':r.wr>=0.55?'#e3b341':r.wr<=0.4?'#f85149':'#8b949e';
      const dirLabel = r.wr>=0.55?'↑ 利多':r.wr<=0.45?'↓ 利空':'→ 中性';
      const dirColor = r.wr>=0.55?'#3fb950':r.wr<=0.45?'#f85149':'#8b949e';
      const avgColor = r.avg>=0?'#3fb950':'#f85149';
      const div = document.createElement('div');
      div.className = 'sig-rule-item';
      if (hl) div.style.borderColor = sc;
      div.innerHTML = `
        <span class="sri-ticker" style="color:${sc}">${st}</span>
        <span class="sri-desc">${r.label.replace(/<[^>]+>/g,'')}</span>
        <span class="sri-wr" style="color:${wrColor}">历史胜率 ${Math.round(r.wr*100)}%（${r.wins}/${r.n}次）</span>
        <span style="color:${avgColor};font-size:10px">均收益 ${r.avg>0?'+':''}${r.avg.toFixed(2)}%</span>
        <span class="sri-dir" style="color:${dirColor}">${dirLabel}</span>
      `;
      rulesList.appendChild(div);
    };
    top1Rules.slice(0,6).forEach((r,i) => renderRule(r, top1.color, top1.ticker, i===0));
    if (otherHits.length) {
      const sep = document.createElement('div');
      sep.style.cssText = 'font-size:10px;color:var(--muted);padding:8px 4px 4px';
      sep.textContent = '其他标的信号';
      rulesList.appendChild(sep);
      otherHits.slice(0,4).forEach(r => renderRule(r, r.color, r.ticker, false));
    }
  }

  // ── Miss analysis ──
  renderMissAnalysis(stockSignals, actualsMap, obs, allConds, nextDate);

  // ── 实时LR预测（仅最新日期显示）──
  if (isLatest) renderRealtimeLR(targetDate);
}

function renderRealtimeLR(targetDate) {
  // 挂载到 miss-analysis 下方，动态插入容器
  const parent = document.getElementById('miss-analysis')?.parentElement;
  if (!parent) return;
  let el = document.getElementById('realtime-lr-panel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'realtime-lr-panel';
    el.style.cssText = 'margin-top:14px;border-top:1px solid var(--border);padding-top:12px';
    parent.appendChild(el);
  }

  const rows = SYMBOLS.map(({ ticker, color, name }) => {
    const lr = lrPredict(ticker, targetDate, true);
    const d  = stockData[ticker];
    if (!lr || !d) return null;
    return { ticker, color, name, lr,
      intradayChg: d.intradayChg,
      intradayOtc: d.intradayOtc,
      realtimePrice: d.realtimePrice };
  }).filter(Boolean);

  if (!rows.length) { el.innerHTML = ''; return; }

  const dirColor = d => d === 'long' ? '#3fb950' : d === 'short' ? '#f85149' : '#8b949e';
  const dirWord  = d => d === 'long' ? '▲ 今日看涨' : d === 'short' ? '▼ 今日看跌' : '— 观望';

  // 期货夜盘摘要
  const nqf = futuresData['NQ=F'];
  const esf = futuresData['ES=F'];
  const fmtFut = (f, name) => {
    if (!f) return '';
    const chg = f.intradayChg;
    const c = chg == null ? '#8b949e' : chg > 0 ? '#3fb950' : chg < 0 ? '#f85149' : '#8b949e';
    const chgStr = chg != null ? `<span style="color:${c};font-weight:700">${chg>0?'+':''}${chg.toFixed(2)}%</span>` : '—';
    return `<span style="margin-right:14px;font-size:11px"><span style="color:var(--muted)">${name} </span>$${f.realtimePrice?.toFixed(2)} ${chgStr}</span>`;
  };
  const futBar = (nqf || esf) ? `
    <div style="padding:8px 10px;border-radius:7px;background:#0d1117;border:1px solid var(--border);
      margin-bottom:8px;display:flex;align-items:center;flex-wrap:wrap;gap:4px">
      <span style="font-size:10px;color:var(--muted);margin-right:8px">夜盘期货：</span>
      ${fmtFut(nqf,'NQ=F 纳指期货')}
      ${fmtFut(esf,'ES=F 标普期货')}
    </div>` : '';

  // 期货当前值（用于显示驱动因子）
  const nqChg = nqf?.intradayChg;
  const esChg = esf?.intradayChg;
  const hasFuturesSignal = nqChg != null || esChg != null;

  el.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
      📡 实时LR预测（8因子·含期货夜盘，预测<strong style="color:var(--text)">次交易日</strong>方向）
    </div>
    ${futBar}
    ${rows.map(r => {
      const futContrib = r.lr.futContrib ?? 0;
      const futStr = hasFuturesSignal && r.lr.useRealtime
        ? `<span style="font-size:10px;color:var(--muted);margin-left:6px">期货贡献 <span style="color:${futContrib>=0?'#3fb950':'#f85149'};font-weight:600">${futContrib>=0?'+':''}${futContrib.toFixed(2)}%</span></span>`
        : '';
      return `
      <div style="display:grid;grid-template-columns:52px 1fr 80px 72px 60px;
        align-items:center;gap:8px;padding:6px 10px;border-radius:7px;
        background:#0d1117;border:1px solid var(--border);margin-bottom:5px;font-size:11px">
        <span style="color:${r.color};font-weight:700">${r.ticker}</span>
        <span style="color:var(--muted)">实时 $${r.realtimePrice?.toFixed(2) ?? '—'}
          <span style="color:${(r.intradayChg??0) >= 0 ? '#3fb950':'#f85149'};margin-left:4px">
            ${r.intradayChg != null ? (r.intradayChg>0?'+':'') + r.intradayChg.toFixed(2)+'%' : '休市'}
          </span>
          ${futStr}
        </span>
        <span style="color:var(--muted);font-size:10px">
          开收比 ${r.intradayOtc != null ? (r.intradayOtc>0?'+':'') + r.intradayOtc.toFixed(2)+'%' : '—'}
        </span>
        <span style="color:${dirColor(r.lr.dir)};font-weight:700">${dirWord(r.lr.dir)}</span>
        <span style="color:var(--muted);font-size:10px">
          置信 ${Math.min(100,Math.abs(r.lr.score)/0.6*100).toFixed(0)}%
        </span>
      </div>
    `}).join('')}
  `;
}

function renderMissAnalysis(stockSignals, actualsMap, obs, allConds, nextDate) {
  const el = document.getElementById('miss-analysis');
  if (!el) return;
  el.innerHTML = '';

  if (!nextDate) return; // no actuals yet

  // Find missed stocks: had a directional signal but was wrong
  const missed = stockSignals.filter(s => {
    const nc = actualsMap[s.ticker];
    if (nc === null || Math.abs(s.longScore) <= 0.05) return false;
    return s.longScore > 0 ? nc <= 0 : nc >= 0;
  });

  if (!missed.length) {
    el.innerHTML = `<div class="miss-section"><div class="miss-title" style="color:#3fb950">✓ 本次没有未命中的方向性预测</div></div>`;
    return;
  }

  el.innerHTML = `<div class="miss-section"><div class="miss-title">📋 未命中原因分析（${missed.length} 只）</div><div id="miss-cards"></div></div>`;
  const cardsEl = document.getElementById('miss-cards');

  missed.forEach(s => {
    const nc = actualsMap[s.ticker];
    const predDir  = s.longScore > 0 ? 'long' : 'short';
    const predWord = predDir === 'long' ? '做多' : '做空';
    const predColor = predDir === 'long' ? '#3fb950' : '#f85149';
    const ncColor  = nc >= 0 ? '#3fb950' : '#f85149';

    const reasons = [];

    // ① 信号强度本身偏弱
    const confPct = Math.min(100, Math.abs(s.longScore) / 0.3 * 100);
    if (confPct < 40) {
      reasons.push({
        icon: '⚠️',
        text: `信号置信度仅 <em>${confPct.toFixed(0)}%</em>，属于弱信号区间（&lt;40%），预测本身不确定性较高`
      });
    }

    // ② 触发规则数量少
    if (s.hitRules.length <= 2) {
      reasons.push({
        icon: '📊',
        text: `仅触发 <em>${s.hitRules.length} 条</em>历史规则，规则覆盖不足，信号基础薄弱`
      });
    }

    // ③ 最强规则的历史胜率本身不高
    const topRule = [...s.hitRules].sort((a,b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5))[0];
    if (topRule && topRule.wr < 0.65 && topRule.wr > 0.35) {
      reasons.push({
        icon: '🎲',
        text: `最强规则历史胜率仅 <em>${Math.round(topRule.wr*100)}%</em>（${topRule.wins}/${topRule.n}次），
               接近随机水平，统计优势有限`
      });
    }

    // ④ 检测是否存在反向强信号被压制
    const reverseRules = allConds.map(cond => {
      if (!cond.fn(s)) return null;
      const hist = obs.filter(o => o.ticker === s.ticker && cond.fn(o));
      if (hist.length < 3) return null;
      const wins = hist.filter(o => o.nextChg > 0).length;
      const wr = wins / hist.length;
      // If predDir=long, look for rules where wr<0.4 (bearish signals)
      // If predDir=short, look for rules where wr>0.6 (bullish signals)
      const isOpposite = predDir === 'long' ? wr < 0.4 : wr > 0.6;
      if (!isOpposite) return null;
      const avg = hist.reduce((acc,o) => acc + o.nextChg, 0) / hist.length;
      return { label: cond.label.replace(/<[^>]+>/g,''), wr, n: hist.length, wins, avg };
    }).filter(Boolean).sort((a,b) => Math.abs(b.wr-0.5) - Math.abs(a.wr-0.5));

    if (reverseRules.length > 0) {
      const rr = reverseRules[0];
      const rrDir = predDir === 'long' ? '利空' : '利多';
      reasons.push({
        icon: '🔄',
        text: `存在被模型忽略的<em>反向信号</em>：「${rr.label}」历史胜率 <em>${Math.round(rr.wr*100)}%</em>（${rr.wins}/${rr.n}次），偏向${rrDir}，与本次预测方向相悖`
      });
    }

    // ⑤ 样本量限制
    const maxN = s.hitRules.reduce((mx, r) => Math.max(mx, r.n), 0);
    if (maxN < 10) {
      reasons.push({
        icon: '📉',
        text: `规则最大样本量仅 <em>${maxN} 次</em>，历史数据偏少，统计结论稳定性不足`
      });
    }

    // ⑥ 当日实际涨跌与预测方向的幅度
    const todayChg = s.todayChg;
    if (predDir === 'long' && todayChg > 3) {
      reasons.push({
        icon: '🔥',
        text: `当日已大涨 <em>+${todayChg.toFixed(2)}%</em>，次日高位回调概率上升，追涨风险较高`
      });
    } else if (predDir === 'short' && todayChg < -3) {
      reasons.push({
        icon: '🔥',
        text: `当日已大跌 <em>${todayChg.toFixed(2)}%</em>，次日超跌反弹概率上升，做空风险较高`
      });
    }

    // ⑦ 市场整体方向与信号相反
    const mktUp = s.marketUpCount >= 5;
    const mktDn = s.marketUpCount <= 2;
    if (predDir === 'short' && mktUp) {
      reasons.push({
        icon: '🌊',
        text: `当日七姐妹中 <em>${s.marketUpCount} 只</em>上涨，市场整体偏强，逆势做空面临更大阻力`
      });
    } else if (predDir === 'long' && mktDn) {
      reasons.push({
        icon: '🌊',
        text: `当日七姐妹中仅 <em>${s.marketUpCount} 只</em>上涨，市场整体偏弱，顺势做多需更强确认`
      });
    }

    if (!reasons.length) {
      reasons.push({
        icon: '❓',
        text: `无法从已有条件中找到明确原因，可能属于低概率随机事件（即使胜率70%的规则也有30%会失败）`
      });
    }

    const card = document.createElement('div');
    card.className = 'miss-card';
    card.innerHTML = `
      <div class="miss-card-header">
        <span class="mc-ticker" style="color:${s.color}">${s.ticker}</span>
        <span class="mc-pred" style="background:${predDir==='long'?'rgba(63,185,80,0.15)':'rgba(248,81,73,0.15)'};

    cardsEl.appendChild(card);
  });
}

// ── Rule Miner ───────────────────────────────────────────────────
// Build a flat list of daily observations for every stock × every day
// Each observation: { ticker, date, todayChg, prevChg, rank, marketUpCount, nextChg }
function buildObservations() {
  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const allDates = [...allDatesSet].sort();

  const obs = [];

  for (let di = 0; di < allDates.length - 1; di++) {
    const today = allDates[di];
    const tomorrow = allDates[di + 1];

    // Gather today's changes for all stocks
    const row = SYMBOLS.map(({ ticker }) => {
      const d = stockData[ticker];
      if (!d) return null;
      const ti = d.dates.indexOf(today);
      const ni = d.dates.indexOf(tomorrow);
      const pi = ti > 0 ? ti - 1 : -1;
      return {
        ticker,
        todayChg:  ti >= 0 && d.changes[ti] != null ? d.changes[ti] : null,
        prevChg:   pi >= 0 && d.changes[pi] != null ? d.changes[pi] : null,
        nextChg:   ni >= 0 && d.changes[ni] != null ? d.changes[ni] : null,
      };
    }).filter(e => e && e.todayChg != null);

    if (row.length < 4) continue;

    // Rank by today's change desc (rank 1 = best)
    const sorted = [...row].sort((a, b) => b.todayChg - a.todayChg);
    sorted.forEach((e, i) => { e.rank = i + 1; });

    // How many stocks up today
    const marketUpCount = row.filter(e => e.todayChg > 0).length;

    row.forEach(e => {
      if (e.nextChg == null) return;
      obs.push({
        ticker:   e.ticker,
        date:     today,
        todayChg: e.todayChg,
        prevChg:  e.prevChg,
        rank:     e.rank,
        total:    row.length,
        marketUpCount,
        nextChg:  e.nextChg,
      });
    });
  }
  return obs;
}

// Two-condition combos (rank × something else, plus short-pattern × momentum)
function buildComboConds() {
  const rankConds  = CONDITIONS.filter(c => c.key.startsWith('rank_'));
  const otherConds = CONDITIONS.filter(c => !c.key.startsWith('rank_') && !c.key.startsWith('top') && !c.key.startsWith('bot') && !c.key.startsWith('short_'));
  const shortConds = CONDITIONS.filter(c => c.key.startsWith('short_'));
  const mktConds   = CONDITIONS.filter(c => c.key.startsWith('mkt_'));
  const combos = [];

  // rank × everything
  rankConds.forEach(r => {
    otherConds.forEach(x => {
      combos.push({
        key: `${r.key}__${x.key}`,
        label: `${r.label} &amp; ${x.label}`,
        fn: o => r.fn(o) && x.fn(o),
      });
    });
  });

  // short-pattern × market breadth (adds extra context to bearish signals)
  shortConds.forEach(s => {
    mktConds.forEach(m => {
      combos.push({
        key: `${s.key}__${m.key}`,
        label: `${s.label} &amp; ${m.label}`,
        fn: o => s.fn(o) && m.fn(o),
      });
    });
  });

  return combos;
}

function scoreRule(matches, target, direction) {
  const n = matches.length;
  if (n < 3) return -Infinity;
  const wins = matches.filter(o => o.nextChg > 0).length;
  const losses = n - wins;
  const longWr  = wins / n;
  const shortWr = losses / n; // 做空胜率 = 次日下跌概率
  const avg  = matches.reduce((s, o) => s + o.nextChg, 0) / n;
  const shortAvg = -avg; // 做空时收益取反

  if (direction === 'short') {
    if (target === 'winrate')  return shortWr;
    if (target === 'avgret')   return shortAvg;
    return shortWr * 0.6 + (shortAvg / 5) * 0.4;
  }
  // long (default)
  if (target === 'winrate')  return longWr;
  if (target === 'avgret')   return avg;
  return longWr * 0.6 + (avg / 5) * 0.4;
}

function renderMiner() {

  if (!el) return;

  const dir    = document.getElementById('miner-dir')?.value || 'long';
  const target = document.getElementById('miner-target')?.value || 'winrate';
  const topN   = +(document.getElementById('miner-topn')?.value || 5);
  const isShort = dir === 'short';

  const obs = buildObservations();
  if (obs.length < 5) {
    el.innerHTML = `<div class="no-rules">数据不足，请切换到「近1个月」后重试</div>`;
    return;
  }

  const allConds = [...CONDITIONS, ...buildComboConds()];

  const results = [];
  allConds.forEach(cond => {
    const matches = obs.filter(cond.fn);
    if (matches.length < 3) return;
    const n      = matches.length;
    const upCnt  = matches.filter(o => o.nextChg > 0).length;
    const dnCnt  = n - upCnt;
    const longWr = upCnt / n;
    const shortWr = dnCnt / n;
    const avg    = matches.reduce((s, o) => s + o.nextChg, 0) / n;
    const score  = scoreRule(matches, target, dir);
    // 展示用的胜率和收益根据方向切换
    const displayWr  = isShort ? shortWr : longWr;
    const displayAvg = isShort ? -avg : avg;
    const displayWins = isShort ? dnCnt : upCnt;
    results.push({ label: cond.label, n, displayWins, displayWr, displayAvg, score });
  });

  results.sort((a, b) => b.score - a.score);
  const top = results.slice(0, topN);

  if (!top.length) {
    el.innerHTML = `<div class="no-rules">没有满足条件的规则（样本量不足）</div>`;
    return;
  }

  // Header hint
  const dirLabel = isShort
    ? '<span style="color:#f85149;font-size:11px;margin-bottom:8px;display:block">▼ 做空信号 · 胜率 = 触发条件后次日下跌概率 · 收益 = 做空获利</span>'
    : '<span style="color:#3fb950;font-size:11px;margin-bottom:8px;display:block">▲ 做多信号 · 胜率 = 触发条件后次日上涨概率 · 收益 = 做多获利</span>';

  el.innerHTML = dirLabel;

  top.forEach((r, idx) => {
    const threshHigh = isShort ? 0.35 : 0.65; // short: 低多头胜率 = 高空头胜率
    const threshMid  = isShort ? 0.45 : 0.55;
    const wrColor  = r.displayWr >= 0.7 ? (isShort ? '#f85149' : '#3fb950')
                   : r.displayWr >= 0.55 ? '#e3b341'
                   : (isShort ? '#3fb950' : '#f85149');
    const avgColor = r.displayAvg >= 0 ? (isShort ? '#f85149' : '#3fb950') : (isShort ? '#3fb950' : '#f85149');
    const medal    = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}.`;
    const rowClass = idx === 0 ? 'rule-row top1' : idx === 1 ? 'rule-row top2' : 'rule-row';
    const winLabel = isShort ? '次日↓' : '次日↑';

    const div = document.createElement('div');
    div.className = rowClass;
    if (isShort) div.style.borderColor = idx === 0 ? '#f85149' : idx === 1 ? 'rgba(248,81,73,0.5)' : '';
    div.innerHTML = `
      <div class="rule-desc">${medal} ${r.label}</div>
      <div class="rule-wr" style="color:${wrColor}">${Math.round(r.displayWr*100)}%</div>
      <div class="rule-avg" style="color:${avgColor}">均 ${r.displayAvg>0?'+':''}${r.displayAvg.toFixed(2)}%</div>
      <div class="rule-n">${r.displayWins}/${r.n}次${winLabel}</div>
    `;
    el.appendChild(div);
  });
}

// ── Multi-variable Linear Regression predictor ───────────────────
// Features per day (for each stock):
//   x0: time index (trend)
//   x1: stock daily return
//   x2: stock open-to-close %
//   x3: QQQ daily return (market)
//   x4: QQQ open-to-close % (market intraday)
// OLS solved via normal equations on the WINDOW days, predicts next day return.
const LR_WINDOW = 10;

function olsSolve(X, y) {
  // X: n×k matrix (array of row arrays), y: n-vector
  // returns coefficients β = (XᵀX)⁻¹Xᵀy
  const n = X.length, k = X[0].length;
  // XᵀX
  const XtX = Array.from({length:k}, () => new Array(k).fill(0));
  const Xty = new Array(k).fill(0);
  for (let i = 0; i < n; i++) {
    for (let a = 0; a < k; a++) {
      Xty[a] += X[i][a] * y[i];
      for (let b = 0; b < k; b++) XtX[a][b] += X[i][a] * X[i][b];
    }
  }
  // Gaussian elimination with partial pivoting
  const aug = XtX.map((row, i) => [...row, Xty[i]]);
  for (let col = 0; col < k; col++) {
    let maxR = col;
    for (let r = col+1; r < k; r++) if (Math.abs(aug[r][col]) > Math.abs(aug[maxR][col])) maxR = r;
    [aug[col], aug[maxR]] = [aug[maxR], aug[col]];
    if (Math.abs(aug[col][col]) < 1e-12) return null; // singular
    const piv = aug[col][col];
    for (let c = col; c <= k; c++) aug[col][c] /= piv;
    for (let r = 0; r < k; r++) {
      if (r === col) continue;
      const f = aug[r][col];
      for (let c = col; c <= k; c++) aug[r][c] -= f * aug[col][c];
    }
  }
  return aug.map(row => row[k]);
}

// 从期货历史数据中获取某日的涨跌幅
function getFuturesChg(sym, date) {
  const f = futuresHistory[sym];
  if (!f) return null;
  const i = f.dates.indexOf(date);
  return i >= 0 ? f.changes[i] : null;
}

// 用全量历史（1年）单变量OLS估算 NQ=F 昨日涨跌 → 个股次日涨跌 的系数
function calcFutureBeta(ticker) {
  const d = stockData[ticker];
  if (!d) return { nq: 0, es: 0 };
  const xNQ = [], xES = [];
  for (let i = 0; i < d.dates.length - 1; i++) {
    const date = d.dates[i];
    const nq   = getFuturesChg('NQ=F', date);
    const es   = getFuturesChg('ES=F', date);
    const next = d.changes[i + 1];
    if (next == null) continue;
    if (nq != null) xNQ.push([nq, next]);
    if (es != null) xES.push([es, next]);
  }
  const simpleLR = pts => {
    if (pts.length < 10) return 0;
    const n  = pts.length;
    const mx = pts.reduce((s,[x])=>s+x,0)/n, my = pts.reduce((s,[,y])=>s+y,0)/n;
    const num = pts.reduce((s,[x,y])=>s+(x-mx)*(y-my),0);
    const den = pts.reduce((s,[x])=>s+(x-mx)**2,0);
    return den > 1e-10 ? num/den : 0;
  };
  return { nq: simpleLR(xNQ), es: simpleLR(xES) };
}

// useRealtime: 用实时夜盘数据预测下一交易日方向
function lrPredict(ticker, beforeDate, useRealtime = false) {
  const d   = stockData[ticker];
  const qqq = stockData['QQQ'];
  if (!d || !qqq) return null;

  const ti = d.dates.indexOf(beforeDate);
  if (ti < LR_WINDOW) return null;

  // 主模型：6特征，10天窗口，稳定不过拟合
  const X = [], y = [];
  for (let i = ti - LR_WINDOW; i < ti; i++) {
    const date  = d.dates[i];
    const ret   = d.changes[i];
    const otc   = d.openToClose?.[i];
    const qi    = qqq.dates.indexOf(date);
    const qRet  = qi >= 0 ? qqq.changes[qi]      : null;
    const qOtc  = qi >= 0 ? qqq.openToClose?.[qi] : null;
    const next  = d.changes[i + 1];
    if (ret == null || otc == null || qRet == null || qOtc == null || next == null) continue;
    const t = i - (ti - LR_WINDOW);
    X.push([1, t, ret, otc, qRet, qOtc]);
    y.push(next);
  }
  if (X.length < 5) return null;

  const beta = olsSolve(X, y);
  if (!beta) return null;

  let todayRet, todayOtc, qTodayRet, qTodayOtc;
  if (useRealtime) {
    todayRet  = d.intradayChg  ?? d.changes[ti];
    todayOtc  = d.intradayOtc  ?? d.openToClose?.[ti];
    const qi  = qqq.dates.indexOf(beforeDate);
    qTodayRet = qqq.intradayChg ?? (qi >= 0 ? qqq.changes[qi]      : null);
    qTodayOtc = qqq.intradayOtc ?? (qi >= 0 ? qqq.openToClose?.[qi] : null);
  } else {
    todayRet  = d.changes[ti];
    todayOtc  = d.openToClose?.[ti];
    const qi  = qqq.dates.indexOf(beforeDate);
    qTodayRet = qi >= 0 ? qqq.changes[qi]      : null;
    qTodayOtc = qi >= 0 ? qqq.openToClose?.[qi] : null;
  }
  if (todayRet == null || todayOtc == null || qTodayRet == null || qTodayOtc == null) return null;

  let predicted = beta[0] + beta[1]*LR_WINDOW + beta[2]*todayRet + beta[3]*todayOtc + beta[4]*qTodayRet + beta[5]*qTodayOtc;

  // 期货调整：用全量历史稳定系数 × 当前期货实时涨跌叠加
  let futContrib = 0, nqContrib = 0, esContrib = 0;
  if (useRealtime) {
    const fb    = calcFutureBeta(ticker);
    const nqNow = futuresData['NQ=F']?.intradayChg ?? getFuturesChg('NQ=F', beforeDate) ?? 0;
    const esNow = futuresData['ES=F']?.intradayChg ?? getFuturesChg('ES=F', beforeDate) ?? 0;
    nqContrib   = fb.nq * nqNow;
    esContrib   = fb.es * esNow;
    futContrib  = nqContrib + esContrib;
    predicted  += futContrib;
  }

  const mean  = y.reduce((s,v)=>s+v,0)/y.length;
  const std   = Math.sqrt(y.reduce((s,v)=>s+(v-mean)**2,0)/y.length) || 1;
  const score = predicted / std;

  const dir = score > 0.2 ? 'long' : score < -0.2 ? 'short' : 'neut';
  return { dir, score, predicted, beta, futContrib, nqContrib, esContrib, useRealtime };
}

// ── Model PK ─────────────────────────────────────────────────────
function runModelPK() {
  // build full obs list to get all dates
  const allObs = buildObservations();
  const allDatesSet = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (d) d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDatesSet.add(dt); });
  });
  const allDates = [...allDatesSet].sort();
  if (allDates.length < LR_WINDOW + 5) return null;

  const allConds = [...CONDITIONS, ...buildComboConds()];

  // per-day results: { date, stocks: [{ticker, ruleDir, lrDir, actual}] }
  const days = [];

  for (let di = LR_WINDOW; di < allDates.length - 1; di++) {
    const today    = allDates[di];
    const tomorrow = allDates[di + 1];

    // build todayRow (same as renderSignalForDate)
    const todayRow = SYMBOLS.map(({ ticker, color, name }) => {
      const d = stockData[ticker];
      if (!d) return null;
      const ti = d.dates.indexOf(today);
      if (ti < 0 || d.changes[ti] == null) return null;
      const pi = ti > 0 ? ti - 1 : -1;
      return { ticker, color, name,
        todayChg: d.changes[ti],
        prevChg:  pi >= 0 ? d.changes[pi] : null };
    }).filter(Boolean);
    if (!todayRow.length) continue;

    const sorted = [...todayRow].sort((a, b) => b.todayChg - a.todayChg);
    sorted.forEach((e, i) => { e.rank = i + 1; });
    const marketUpCount = todayRow.filter(e => e.todayChg > 0).length;
    todayRow.forEach(e => { e.marketUpCount = marketUpCount; });

    // rule engine signals (using only obs before today)
    const obs = allObs.filter(o => o.date < today);

    const stockResults = todayRow.map(stock => {
      // rule engine
      const hitRules = [];
      allConds.forEach(cond => {
        if (!cond.fn(stock)) return;
        const hist = obs.filter(o => o.ticker === stock.ticker && cond.fn(o));
        if (hist.length < 3) return;
        const wins = hist.filter(o => o.nextChg > 0).length;
        const wr   = wins / hist.length;
        hitRules.push({ wr, n: hist.length });
      });
      let wSum = 0, wTot = 0;
      hitRules.forEach(r => { wSum += (r.wr - 0.5) * r.n; wTot += r.n; });
      const ruleScore = wTot > 0 ? wSum / wTot : 0;
      const ruleDir   = ruleScore > 0.05 ? 'long' : ruleScore < -0.05 ? 'short' : 'neut';

      // LR signal
      const lr = lrPredict(stock.ticker, today);
      const lrDir = lr ? lr.dir : 'neut';

      // actual next day
      const d = stockData[stock.ticker];
      const ni = d ? d.dates.indexOf(tomorrow) : -1;
      const actual = ni >= 0 && d.changes[ni] != null ? d.changes[ni] : null;

      return { ticker: stock.ticker, color: stock.color, ruleDir, lrDir, actual };
    });

    days.push({ date: today, stocks: stockResults });
  }

  // aggregate stats
  let ruleHit = 0, ruleTot = 0, lrHit = 0, lrTot = 0;
  days.forEach(({ stocks }) => {
    stocks.forEach(s => {
      if (s.actual === null) return;
      if (s.ruleDir !== 'neut') {
        ruleTot++;
        if (s.ruleDir === 'long' ? s.actual > 0 : s.actual < 0) ruleHit++;
      }
      if (s.lrDir !== 'neut') {
        lrTot++;
        if (s.lrDir === 'long' ? s.actual > 0 : s.actual < 0) lrHit++;
      }
    });
  });

  return {
    rule: { hit: ruleHit, tot: ruleTot, rate: ruleTot > 0 ? ruleHit / ruleTot : 0 },
    lr:   { hit: lrHit,  tot: lrTot,  rate: lrTot  > 0 ? lrHit  / lrTot  : 0 },
    days,
  };
}

  const tbody = tableEl.querySelector('tbody');

  recent.forEach(({ date, stocks }) => {
    stocks.forEach((s, i) => {
      const tr = document.createElement('tr');
      const actualColor = s.actual === null ? '#8b949e' : s.actual >= 0 ? '#3fb950' : '#f85149';

      const ruleCls = s.ruleDir === 'neut' ? 'neut'
        : (s.actual !== null && (s.ruleDir === 'long' ? s.actual > 0 : s.actual < 0)) ? 'hit-rule' : 'miss-rule';
      const ruleWord = s.ruleDir === 'long' ? '▲做多' : s.ruleDir === 'short' ? '▼做空' : '—观望';

      const lrCls = s.lrDir === 'neut' ? 'neut'
        : (s.actual !== null && (s.lrDir === 'long' ? s.actual > 0 : s.actual < 0)) ? 'hit-lr' : 'miss-lr';
      const lrWord = s.lrDir === 'long' ? '▲做多' : s.lrDir === 'short' ? '▼做空' : '—观望';

      tr.innerHTML = `
        <td style="color:var(--muted);white-space:nowrap">${i===0 ? fmtDate(date) : ''}</td>
        <td style="color:${s.color};font-weight:700">${s.ticker}</td>
        <td><span class="pk-badge ${ruleCls}">${ruleWord}</span></td>
        <td><span class="pk-badge ${lrCls}">${lrWord}</span></td>
        <td style="color:${actualColor};font-weight:600">
          ${s.actual !== null ? (s.actual>0?'+':'') + s.actual.toFixed(2)+'%' : '—'}
        </td>
      `;
      tbody.appendChild(tr);
    });
  });
}

// ── Rank Winrate Analysis ────────────────────────────────────────
// For each trading day, rank all 7 stocks by that day's change (rank1=best).
// Then look at the NEXT day's change for that stock.
// Aggregate: per rank slot → winrate (next day > 0) + avg next-day change.
function buildRankStats() {
  // Collect all dates that appear in ALL available stocks
  const allDates = new Set();
  SYMBOLS.forEach(({ ticker }) => {
    const d = stockData[ticker];
    if (!d) return;
    d.dates.forEach((dt, i) => { if (d.changes[i] != null) allDates.add(dt); });
  });

  const sortedDates = [...allDates].sort();

  // rankStats[rank] = { wins, total, nextChanges[] }  rank: 0-indexed (0=best)
  const rankStats = Array.from({ length: 7 }, () => ({ wins: 0, total: 0, nextChanges: [] }));

  // detailRows: per trading day, the ranked list
  const detailRows = [];

  for (let di = 0; di < sortedDates.length - 1; di++) {
    const today = sortedDates[di];
    const tomorrow = sortedDates[di + 1];

    // Get today's change for each stock
    const entries = SYMBOLS.map(({ ticker, name, color }) => {
      const d = stockData[ticker];
      if (!d) return null;
      const todayIdx = d.dates.indexOf(today);
      const tomIdx   = d.dates.indexOf(tomorrow);
      if (todayIdx < 0 || d.changes[todayIdx] == null) return null;
      return {
        ticker, name, color,
        todayChg: d.changes[todayIdx],
        nextChg:  (tomIdx >= 0 && d.changes[tomIdx] != null) ? d.changes[tomIdx] : null,
      };
    }).filter(Boolean);

    if (entries.length < 2) continue;

    // Sort descending by today's change → rank 1 = best performer
    entries.sort((a, b) => b.todayChg - a.todayChg);

    const row = { date: today, entries: [] };
    entries.forEach((e, rankIdx) => {
      row.entries.push({ ...e, rank: rankIdx + 1 });
      if (e.nextChg !== null && rankIdx < rankStats.length) {
        rankStats[rankIdx].total++;
        if (e.nextChg > 0) rankStats[rankIdx].wins++;
        rankStats[rankIdx].nextChanges.push(e.nextChg);
      }
    });
    detailRows.push(row);
  }

  return { rankStats, detailRows };
}

function renderRankWinrate() {
  const cardsEl = document.getElementById('rank-cards');
  const tableEl = document.getElementById('rank-detail');
  if (!cardsEl || !tableEl) return;

  const { rankStats, detailRows } = buildRankStats();

  if (detailRows.length === 0) {
    cardsEl.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);font-size:12px">数据不足，至少需要2个交易日</div>`;
    return;
  }

  // Find best / worst winrate rank
  const validStats = rankStats.filter(s => s.total > 0);
  const maxWR = validStats.length ? Math.max(...validStats.map(s => s.wins / s.total)) : 0;
  const minWR = validStats.length ? Math.min(...validStats.map(s => s.wins / s.total)) : 0;

  // ── Rank cards ──
  cardsEl.innerHTML = '';
  rankStats.forEach((s, i) => {
    const wr = s.total > 0 ? s.wins / s.total : null;
    const avgNext = s.nextChanges.length
      ? s.nextChanges.reduce((a,b)=>a+b,0) / s.nextChanges.length
      : null;
    const isBest  = wr !== null && wr === maxWR && s.total > 0;
    const isWorst = wr !== null && wr === minWR && s.total > 0 && minWR !== maxWR;

    const pctColor = wr === null ? '#8b949e' : wr >= 0.6 ? '#3fb950' : wr <= 0.4 ? '#f85149' : '#e6edf3';
    const avgColor = avgNext === null ? '#8b949e' : avgNext >= 0 ? '#3fb950' : '#f85149';

    const card = document.createElement('div');
    card.className = 'rank-card' + (isBest ? ' best' : isWorst ? ' worst' : '');
    card.innerHTML = `
      <div class="rk-num">第 ${i+1} 名</div>
      <div class="rk-pct" style="color:${pctColor}">
        ${wr !== null ? Math.round(wr*100) + '%' : '—'}
      </div>
      <div class="rk-frac">${s.wins}/${s.total} 次↑</div>
      <div class="rk-avg" style="color:${avgColor}">
        次日均 ${avgNext !== null ? (avgNext>0?'+':'')+avgNext.toFixed(2)+'%' : '—'}
      </div>
    `;
    cardsEl.appendChild(card);
  });

  // ── Detail table ──
  // Header
  const maxCols = Math.max(...detailRows.map(r => r.entries.length));
  const rankHeaders = Array.from({length: maxCols}, (_,i) => `<th>第${i+1}名</th>`).join('');
  tableEl.innerHTML = `
    <thead>
      <tr><th>日期</th>${rankHeaders}</tr>
    </thead>
    <tbody id="rank-detail-body"></tbody>
  `;

  const tbody = tableEl.querySelector('tbody');
  detailRows.forEach(({ date, entries }) => {
    const tr = document.createElement('tr');
    const nextDay = entries[0]?.nextChg !== null ? '有次日' : '';
    let html = `<td style="color:var(--muted);white-space:nowrap">${fmtDate(date)}</td>`;

    entries.forEach(e => {
      const todayColor = e.todayChg >= 0 ? '#3fb950' : '#f85149';
      const nextColor  = e.nextChg === null ? '#8b949e' : e.nextChg >= 0 ? '#3fb950' : '#f85149';
      const nextStr    = e.nextChg !== null
        ? `<span style="color:${nextColor}">${e.nextChg>0?'+':''}${e.nextChg.toFixed(2)}%</span>`
        : `<span style="color:#484f58">—</span>`;
      html += `
        <td>
          <span style="color:${e.color};font-weight:700">${e.ticker}</span>
          <span style="color:${todayColor};margin-left:3px">${e.todayChg>0?'+':''}${e.todayChg.toFixed(2)}%</span>
          <br><span style="font-size:10px;color:var(--muted)">次日→</span> ${nextStr}
        </td>`;
    });

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}
